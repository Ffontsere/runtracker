<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RunTracker">
<meta name="mobile-web-app-capable" content="yes">

<link rel="apple-touch-icon" href="icon-192.png">

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>
:root{--or:#FC4C02;--bg:#F7F7FA;--cd:#FFF;--tx:#242428;--ts:#6B6B76;--tm:#9E9EA8;--bd:#E8E8ED;--ok:#00B865;--wn:#F5A623;--dn:#E5383B;--bu:#2D71E6}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Source Sans 3','Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);overscroll-behavior:none;padding-top:env(safe-area-inset-top,0);padding-bottom:env(safe-area-inset-bottom,0)}
.topbar{background:#fff;border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:100;padding:10px 16px}
.topbar-inner{max-width:720px;margin:0 auto}
.logo{display:flex;align-items:center;gap:8px;justify-content:space-between}
.logo b{font-size:17px;font-weight:900;color:var(--or)}
.tabs{display:flex;gap:2px;overflow-x:auto;margin-top:8px;padding-bottom:2px;-webkit-overflow-scrolling:touch}
.tabs button{background:none;border:none;border-bottom:2px solid transparent;padding:6px 10px;font-size:12px;font-weight:700;color:var(--ts);cursor:pointer;white-space:nowrap;font-family:inherit}
.tabs button.active{color:var(--or);border-bottom-color:var(--or);background:rgba(252,76,2,.06)}
.main{max-width:720px;margin:0 auto;padding:16px 16px 80px}
.card{background:var(--cd);border-radius:12px;border:1px solid var(--bd);padding:16px;margin-bottom:12px}
.card h3{font-size:12px;font-weight:700;color:var(--ts);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px}
.banner{background:linear-gradient(135deg,#FC4C02,#E84400);border-radius:14px;padding:18px 20px;color:#fff;margin-bottom:16px;position:relative;overflow:hidden}
.banner::after{content:'';position:absolute;right:-20px;top:-20px;width:90px;height:90px;border-radius:50%;background:rgba(255,255,255,.1)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.stat{background:var(--cd);border-radius:10px;border:1px solid var(--bd);padding:12px;text-align:center}
.stat .label{font-size:10px;color:var(--tm);text-transform:uppercase;letter-spacing:.07em}
.stat .val{font-size:18px;font-weight:800;margin:2px 0}
.stat .unit{font-size:10px;color:var(--tm)}
.badge{display:inline-flex;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.03em}
.tip{border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;gap:10px;align-items:flex-start;font-size:13px;line-height:1.5}
.act-card{background:var(--cd);border-radius:12px;border:1px solid var(--bd);margin-bottom:10px;overflow:hidden}
.act-head{display:flex;justify-content:space-between;align-items:center;padding:12px 16px 8px}
.act-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(85px,1fr));border-top:1px solid var(--bd)}
.act-stats>div{padding:10px 14px;border-right:1px solid #f0f0f4}
.act-stats .al{font-size:9px;color:var(--tm);text-transform:uppercase;letter-spacing:.07em}
.act-stats .av{font-size:15px;font-weight:700}
.plan-item{background:var(--cd);border-radius:10px;border:1px solid var(--bd);border-left-width:4px;padding:14px 16px;margin-bottom:6px;display:flex;gap:12px}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.form-grid label{font-size:10px;color:var(--tm);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:3px}
.form-grid input{background:var(--bg);border:1px solid var(--bd);border-radius:8px;padding:10px 12px;font-size:14px;width:100%;outline:none;font-family:inherit;color:var(--tx)}
.form-grid input:focus{border-color:var(--or);box-shadow:0 0 0 2px rgba(252,76,2,.06)}
.btn{background:var(--or);border:none;border-radius:24px;padding:12px 28px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.chart-box{position:relative;width:100%;height:200px;margin-bottom:8px}
.sec-title{font-size:18px;font-weight:800;letter-spacing:-.02em;margin-bottom:4px}
.sec-sub{font-size:13px;color:var(--tm);margin-bottom:16px}
.heatmap{display:flex;gap:2px;overflow-x:auto;padding-bottom:8px}
.heatmap-col{display:flex;flex-direction:column;gap:2px}
.heatmap-cell{width:14px;height:14px;border-radius:3px}
.badge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
.badge-item{padding:12px 10px;border-radius:10px;border:1px solid var(--bd);text-align:center}
.badge-item.earned{border-color:rgba(252,76,2,.3);background:rgba(252,76,2,.06)}
.badge-item.locked{opacity:.45}
.hidden{display:none}
.progress-bar{height:6px;background:#f0f0f4;border-radius:3px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:3px;transition:width .6s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.tab-content{animation:fadeIn .3s ease}
.del-btn{background:none;border:none;color:var(--tm);font-size:16px;cursor:pointer;padding:4px}
.help-tag{display:inline-flex;align-items:center;gap:3px;cursor:pointer;border-bottom:1px dashed var(--tm)}
.help-tag::after{content:"ⓘ";font-size:9px;color:var(--bu);font-style:normal}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s ease}
.modal-card{background:var(--cd);border-radius:16px 16px 0 0;max-width:720px;width:100%;max-height:75vh;overflow-y:auto;padding:24px 20px 32px;box-shadow:0 -4px 24px rgba(0,0,0,.15)}
.modal-card h2{font-size:17px;font-weight:800;margin-bottom:4px;color:var(--tx)}
.modal-card .mdesc{font-size:13px;color:var(--ts);line-height:1.7;margin-bottom:12px}
.modal-card .mclose{position:absolute;top:16px;right:20px;background:none;border:none;font-size:22px;cursor:pointer;color:var(--tm)}
</style>
<div id="helpModal" style="display:none"></div>
</head>
<body>
<div class="topbar"><div class="topbar-inner">
  <div class="logo">
    <div style="display:flex;align-items:center;gap:8px">
      <svg width="24" height="24" viewBox="0 0 28 28"><path d="M14 3L8 16h4l-2 9 10-13h-5l3-9z" fill="#FC4C02"/></svg>
      <b>RunTracker</b>
      <span id="statusBadge" class="badge" style="font-size:10px;cursor:pointer" onclick="showHelp('status')"></span>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <span id="weekMini" style="font-size:12px;color:var(--tm)"></span>
      <div style="width:50px;height:4px;background:#f0f0f4;border-radius:2px;overflow:hidden"><div id="weekBar" style="height:100%;background:var(--or);border-radius:2px;width:0"></div></div>
    </div>
  </div>
  <div class="tabs" id="tabs"></div>
</div></div>
<div class="main" id="main"></div>

<script>
// ═══ GLOSSARY ═══
const GLOSS={
  trimp:{t:"TRIMP — Training Impulse",d:"Mesura la càrrega d'entrenament combinant la durada i la intensitat (freqüència cardíaca). Un TRIMP alt indica una sessió molt exigent. Desenvolupat per Banister (1975).<br><br><b>Valors orientatius:</b><br>• &lt;50: Sessió lleugera / recuperació<br>• 50–100: Sessió moderada<br>• 100–150: Sessió dura<br>• &gt;150: Sessió molt exigent<br><br><b>Fórmula:</b> TRIMP = minuts × %FCReserva × 0.64 × e^(1.92 × %FCReserva)"},
  ctl:{t:"CTL — Chronic Training Load (Fitness)",d:"Mitjana exponencial de la càrrega d'entrenament dels últims ~42 dies. Representa la teva <b>fitness acumulada</b>. Puja lentament amb entrenament consistent i baixa quan deixes d'entrenar.<br><br>Un CTL alt = has entrenat molt i de forma sostinguda."},
  atl:{t:"ATL — Acute Training Load (Fatiga)",d:"Mitjana exponencial de la càrrega dels últims ~7 dies. Representa la <b>fatiga recent</b>. Puja ràpidament després de sessions dures i baixa ràpid amb descans.<br><br>Un ATL alt = estàs fatigat pels entrenaments recents."},
  tsb:{t:"TSB — Training Stress Balance (Forma)",d:"TSB = Fitness (CTL) − Fatiga (ATL). Indica si estàs <b>fresc o fatigat</b>.<br><br><b>Valors:</b><br>• TSB positiu (&gt;10): Estàs fresc, bon moment per competir<br>• TSB ~0: Equilibri entre fitness i fatiga<br>• TSB negatiu (&lt;-10): Fatiga acumulada, cal recuperar<br><br>Per fer 'peaking' (arribar en forma a una cursa), busca un TSB positiu amb CTL alt."},
  acwr:{t:"ACWR — Acute:Chronic Workload Ratio",d:"Ràtio entre la càrrega de l'última setmana i la mitjana de les últimes 4 setmanes. Mesura si estàs augmentant la càrrega massa ràpid.<br><br><b>Zones:</b><br>• &lt;0.8: Càrrega baixa, possible desentrenament<br>• <b>0.8–1.3: Zona òptima ✓</b><br>• 1.3–1.5: Zona de precaució ⚠<br>• &gt;1.5: Alt risc de lesió 🔴<br><br>La regla del 10%: no incrementis més d'un 10% setmanal."},
  vo2:{t:"VO₂max — Consum Màxim d'Oxigen",d:"Capacitat màxima del cos per transportar i utilitzar oxigen durant l'exercici. És el <b>millor indicador de fitness aeròbic</b>.<br><br><b>Valors típics (homes):</b><br>• &lt;40: Principiant<br>• 40–45: Acceptable<br>• 45–50: Bo<br>• 50–55: Molt bo<br>• &gt;55: Excel·lent / elit amateur<br><br>L'estimació es basa en la relació entre ritme i FC (mètode Jack Daniels)."},
  gap:{t:"GAP — Grade Adjusted Pace",d:"Ritme equivalent en terreny pla. Ajusta el teu pace real tenint en compte el <b>desnivell</b>.<br><br>Exemple: si corres a 6:00/km amb 5% de pendent, el teu GAP podria ser ~5:05/km — és a dir, l'esforç equivalent en pla.<br><br>Útil per comparar sessions amb desnivell diferent i per saber si realment vas més ràpid o era el terreny."},
  zones:{t:"Zones de Freqüència Cardíaca",d:"Rangs d'intensitat basats en la teva FC Màxima i FC Repòs (mètode Karvonen):<br><br>• <b>Z1 Recuperació</b> (&lt;60% FCR): Molt fàcil, recuperació activa<br>• <b>Z2 Aeròbic</b> (60-70% FCR): Base aeròbica, ritme conversacional. La zona més important per salut.<br>• <b>Z3 Tempo</b> (70-80% FCR): Còmodament dur, millora resistència<br>• <b>Z4 Llindar</b> (80-90% FCR): Dur, prop del llindar anaeròbic<br>• <b>Z5 VO₂max</b> (&gt;90% FCR): Molt dur, intervals curts<br><br><b>Model 80/20:</b> ~80% del volum en Z1-Z2, ~20% en Z3-Z5."},
  ff:{t:"Fitness & Freshness (Banister)",d:"Model matemàtic que prediu la teva <b>forma esportiva</b> combinant tres mètriques:<br><br>• <b>Fitness (CTL)</b>: Acumulació d'entrenament (~42 dies)<br>• <b>Fatiga (ATL)</b>: Cansament recent (~7 dies)<br>• <b>Forma (TSB)</b>: Fitness − Fatiga<br><br>Desenvolupat per Eric Banister el 1975 i adoptat per Strava, TrainingPeaks i Garmin. El gràfic mostra l'evolució de les tres corbes al llarg del temps."},
  efficiency:{t:"Eficiència Cardíaca",d:"Ràtio entre ritme (segons/km) i FC mitjana (bpm). Un valor <b>més baix</b> és millor: significa que corres més ràpid amb menys esforç cardíac.<br><br>Exemple: 3.5 s/bpm és més eficient que 4.0 s/bpm.<br><br>Si l'eficiència millora al llarg del temps amb el mateix ritme, indica <b>adaptació aeròbica</b> (el cor bombeja més sang per batec)."},
  intensity:{t:"Intensitat — % FC Màxima",d:"Percentatge de la teva freqüència cardíaca mitjana respecte a la FC màxima configurada.<br><br>• &lt;65%: Molt fàcil (recuperació)<br>• 65–75%: Fàcil (Z2 aeròbic)<br>• 75–82%: Moderat (tempo)<br>• 82–90%: Dur (llindar)<br>• &gt;90%: Molt dur (VO₂max)<br><br>Per mantenir forma i salut, la majoria de sessions haurien de ser al 65-75%."},
  monotony:{t:"Monotonia d'Entrenament",d:"Mesura quant de <b>semblants</b> són les teves sessions dia a dia. Es calcula com la mitjana diària de TRIMP dividida per la desviació estàndard.<br><br>• &lt;1.5: Bona variabilitat ✓<br>• 1.5–2.0: Precaució<br>• &gt;2.0: Monotonia alta — risc de sobreentrenament<br><br>Solució: alterna sessions llargues/curtes i fàcils/dures."},
  re:{t:"Esforç Relatiu Setmanal",d:"Suma del TRIMP de totes les sessions d'una setmana. La <b>banda</b> (±20% de la mitjana de 3 setmanes) indica si estàs entrenant dins la normalitat.<br><br>• Dins la banda: Consistent ✓<br>• Per sobre: Setmana dura, cal recuperar<br>• Per sota: Setmana fàcil (pot ser descàrrega planificada)"},
  pr:{t:"Personal Records (Millors Marques)",d:"Les millors marques estimades per a cada distància de referència (1K, 5K, 10K, Mitja, Marató), calculades a partir del ritme i temps de les teves activitats.<br><br>Es busca la millor combinació pace×distància per a cada distància estàndard."},
  riegel:{t:"Predicció de Cursa (Riegel)",d:"Fórmula de Pete Riegel (1977) per predir temps de cursa a altres distàncies basant-se en un resultat conegut:<br><br><b>T₂ = T₁ × (D₂/D₁)^1.06</b><br><br>Exemple: si fas 5K en 25:00, prediu ~52:30 per 10K.<br><br>L'exponent 1.06 reflecteix que no pots mantenir el mateix ritme a distàncies més llargues."},
  streak:{t:"Ratxa (Running Streak)",d:"Nombre de <b>dies consecutius</b> amb almenys una activitat registrada.<br><br>Les ratxes motiven la consistència, però recorda: el descans és part de l'entrenament. No sacrifiquis la recuperació per mantenir una ratxa."},
  badges:{t:"Badges (Assoliments)",d:"Fites d'entrenament que es desbloquegen automàticament al complir certs objectius: distàncies acumulades, ratxes, desnivell, velocitat, volum...<br><br>Inspirats en Smashrun i Strava, serveixen com a motivació extra per mantenir la consistència."},
  status:{t:"Training Status (Estat d'Entrenament)",d:"Classificació automàtica de l'estat actual basada en tendències de Fitness i Fatiga:<br><br>• 🟢 <b>Productiu</b>: CTL pujant, estàs millorant<br>• 🔵 <b>Manteniment</b>: Fitness estable<br>• 🟡 <b>Recuperació</b>: Càrrega reduïda, el cos descansa<br>• ⭐ <b>Peaking</b>: Fitness alt + fatiga baixa = forma màxima<br>• 🔴 <b>Sobrecarregat</b>: TSB molt negatiu, cal descansar<br>• 📉 <b>Desentrenament</b>: Sense activitat recent<br><br>Inspirat en Garmin Training Status (Firstbeat Analytics)."},
  easytr:{t:"Easy TRIMP Recomanat",d:"TRIMP màxim suggerit per a la sessió de demà que mantindria el TSB (Training Stress Balance) a zero — és a dir, sense acumular més fatiga.<br><br>Si estàs fatigat (TSB negatiu), et recomana dies de descans en lloc d'un valor TRIMP."},
  heatmap:{t:"Calendari Heatmap",d:"Visualització dels últims 6 mesos on cada quadrat representa un dia. La <b>intensitat del color</b> indica els quilòmetres recorreguts aquell dia.<br><br>Permet veure patrons de consistència, setmanes de càrrega/descàrrega, i períodes d'inactivitat d'un cop d'ull."}
};

function showHelp(key){
  const g=GLOSS[key];if(!g)return;
  const el=document.getElementById("helpModal");
  el.style.display="block";
  el.innerHTML="<div class='modal-overlay' onclick='hideHelp()'><div class='modal-card' onclick='event.stopPropagation()'><div style='width:40px;height:4px;background:var(--bd);border-radius:2px;margin:0 auto 16px'></div><h2>"+g.t+"</h2><div class='mdesc'>"+g.d+"</div><button class='btn' onclick='hideHelp()' style='width:100%;margin-top:8px'>Entesos</button></div></div>";
}
function hideHelp(){document.getElementById("helpModal").style.display="none"}
function ht(key,label){return "<span class='help-tag' onclick='event.stopPropagation();showHelp(\""+key+"\")'>"+label+"</span>"}

// ═══ STATE ═══
const TABS=[{id:"feed",l:"⚡ Activitat"},{id:"prog",l:"📊 Progrés"},{id:"fit",l:"💪 Fitness"},{id:"rec",l:"🏆 Rècords"},{id:"plan",l:"🎯 Pla"},{id:"cal",l:"📅 Calendari"},{id:"imp",l:"📥 Importar"},{id:"cfg",l:"👤 Perfil"}];
const DSET={hrMax:190,hrRest:50,weeklyTarget:45,yearlyGoal:2200,name:"Francesc",weight:70,zones:null,stravaClientId:"220720",stravaSecret:"",stravaToken:"",stravaRefresh:"",stravaExpires:0};
let acts=[], settings={...DSET}, curTab="feed", charts={}, selectedAct=null;

function load(){try{acts=JSON.parse(localStorage.getItem("rt4:a"))||[]}catch{acts=[]}try{settings={...DSET,...JSON.parse(localStorage.getItem("rt4:s"))}}catch{settings={...DSET}}}
function saveActs(){localStorage.setItem("rt4:a",JSON.stringify(acts))}
function saveSettings(){localStorage.setItem("rt4:s",JSON.stringify(settings))}

// ═══ UTILS ═══
const fP=s=>{if(!s||s<=0)return"--:--";return Math.floor(s/60)+":"+String(Math.round(s%60)).padStart(2,"0")};
const fD=s=>{if(!s)return"--:--";const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),c=Math.round(s%60);return h>0?h+"h "+m+"m":m+":"+String(c).padStart(2,"0")};
const fDH=s=>{if(!s)return"--:--:--";const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),c=Math.round(s%60);return h+":"+String(m).padStart(2,"0")+":"+String(c).padStart(2,"0")};
const fDL=s=>{if(!s)return"--";const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);return h>0?h+"h"+m+"m":m+"min"};
const pP=s=>{if(!s)return null;const c=String(s).replace(",",".").trim(),m=c.match(/^(\d+):(\d{2})$/);if(m)return+m[1]*60+ +m[2];const n=parseFloat(c);return isNaN(n)?null:n*60};
const pD=s=>{if(!s)return null;const t=String(s).trim(),h=t.match(/^(\d+):(\d{2}):(\d{2})$/);if(h)return+h[1]*3600+ +h[2]*60+ +h[3];const m=t.match(/^(\d+):(\d{2})$/);if(m)return+m[1]*60+ +m[2];const n=parseFloat(t);return isNaN(n)?null:n};
const karv=(mx,r)=>[Math.round(r+(mx-r)*.6),Math.round(r+(mx-r)*.7),Math.round(r+(mx-r)*.8),Math.round(r+(mx-r)*.9)];
const hZ=(hr,mx,r,z)=>{const b=z||karv(mx,r);return hr<b[0]?0:hr<b[1]?1:hr<b[2]?2:hr<b[3]?3:4};
const cTR=(dm,hr,mx,r)=>{if(!dm||!hr||!mx||!r)return null;const x=(hr-r)/(mx-r);return x>0&&x<1?Math.round(dm*x*.64*Math.exp(1.92*x)):null};
const wK=d=>{const dt=new Date(d),dy=dt.getDay(),df=dt.getDate()-dy+(dy===0?-6:1);const m=new Date(dt);m.setDate(df);return m.toISOString().slice(0,10)};
const wL=w=>{const d=new Date(w),ms=["gen","feb","mar","abr","mai","jun","jul","ago","set","oct","nov","des"];return d.getDate()+" "+ms[d.getMonth()]};
const dS=ds=>Math.floor((Date.now()-new Date(ds).getTime())/864e5);
const rD=ds=>{const d=dS(ds);if(d===0)return"Avui";if(d===1)return"Ahir";if(d<7)return"Fa "+d+" dies";const dt=new Date(ds),ms=["gen","feb","mar","abr","mai","jun","jul","ago","set","oct","nov","des"];return dt.getDate()+" "+ms[dt.getMonth()]};
const dateStr=d=>d.toISOString().slice(0,10);
const estVO2=(p,hr,mx)=>{if(!p||!hr||!mx||p<=0)return null;const v=(1000/p)*60,vo2=-4.6+.182258*v+.000104*v*v,r=hr/mx;if(r<.5||r>1)return null;const pv=(r-.3727)/.6463;return pv>0&&pv<1.1?Math.round(vo2/pv*10)/10:null};

// ═══ CSV PARSER ═══
const CMAP={date:["Date","Fecha","Data","Activity Date"],type:["Activity Type","Tipo de actividad"],distance:["Distance","Distancia","Distància"],duration:["Time","Tiempo","Temps","Moving Time","Elapsed Time"],avgHR:["Avg HR","FC media","Average Heart Rate (bpm)"],maxHR:["Max HR","FC máxima"],pace:["Avg Pace","Ritmo medio"],ascent:["Total Ascent","Ascenso total","Elevation Gain"],title:["Title","Título","Name","Activity Name","Nombre"],cadence:["Avg Run Cadence","Cadencia media carrera"]};
const fC=(hs,cs)=>{for(const c of cs){const f=hs.find(h=>h.trim().toLowerCase()===c.toLowerCase());if(f)return f}return null};
const RT=["running","trail running","treadmill","carrera","trail","cinta","cursa","córrer"];
const isR=t=>!t||RT.some(r=>String(t).toLowerCase().includes(r));

function parseCSV(text){
  const res=Papa.parse(text,{header:true,skipEmptyLines:true});
  if(!res.data||!res.data.length)return[];
  const hs=res.meta.fields||[],cm={};
  for(const[k,v]of Object.entries(CMAP))cm[k]=fC(hs,v);
  const out=[];
  for(const row of res.data){
    if(!isR(cm.type?row[cm.type]:null))continue;
    const dr=cm.date?row[cm.date]:null;if(!dr)continue;
    let date;try{date=new Date(dr);if(isNaN(date)){const p=dr.match(/(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{4})/);if(p)date=new Date(p[3],p[2]-1,p[1])}}catch{continue}
    if(isNaN(date))continue;
    const num=k=>{const c=cm[k];if(!c)return null;const v=parseFloat(String(row[c]||"").replace(",",".").replace(/[^\d.\-]/g,""));return isNaN(v)?null:v};
    const dist=num("distance"),dur=pD(cm.duration?row[cm.duration]:null),avgHR=num("avgHR"),maxHR=num("maxHR"),asc=num("ascent"),cad=num("cadence");
    let pace=pP(cm.pace?row[cm.pace]:null);

  }

}

function getWeekly(){
  const w={};
  acts.forEach(a=>{const wk=wK(a.date);if(!w[wk])w[wk]={week:wk,km:0,n:0,trimp:0,pcs:[],hrs:[],vo2s:[]};w[wk].km+=a.distance||0;w[wk].n++;w[wk].trimp+=a.trimp||0;if(a.pace)w[wk].pcs.push(a.pace);if(a.avgHR)w[wk].hrs.push(a.avgHR);if(a.vo2)w[wk].vo2s.push(a.vo2)});
  return Object.values(w).map(x=>({...x,km:Math.round(x.km*10)/10,avgP:x.pcs.length?x.pcs.reduce((s,v)=>s+v,0)/x.pcs.length:null,avgHR:x.hrs.length?Math.round(x.hrs.reduce((s,v)=>s+v,0)/x.hrs.length):null,avgVO2:x.vo2s.length?Math.round(x.vo2s.reduce((s,v)=>s+v,0)/x.vo2s.length*10)/10:null})).sort((a,b)=>a.week.localeCompare(b.week)).slice(-16);
}
function calcFF(){
  if(!acts.length)return[];
  const sorted=[...acts].sort((a,b)=>a.date.localeCompare(b.date));
  const first=new Date(sorted[0].date),today=new Date(),days=Math.ceil((today-first)/864e5)+1;
  const daily={};sorted.forEach(a=>{daily[a.date]=(daily[a.date]||0)+(a.trimp||(a.distance||0)*5)});
  let ctl=0,atl=0;const data=[];
  for(let i=0;i<days;i++){const d=new Date(first);d.setDate(d.getDate()+i);const ds=dateStr(d);const tr=daily[ds]||0;ctl=ctl*(1-1/42)+tr/42;atl=atl*(1-1/7)+tr/7;if(i%3===0||i===days-1)data.push({date:ds,label:wL(ds),ctl:Math.round(ctl*10)/10,atl:Math.round(atl*10)/10,tsb:Math.round((ctl-atl)*10)/10})}
  return data;
}
function calcACWR(){const a7=acts.filter(a=>dS(a.date)<=7).reduce((s,a)=>s+(a.trimp||(a.distance||0)*5),0);const c28=acts.filter(a=>dS(a.date)<=28).reduce((s,a)=>s+(a.trimp||(a.distance||0)*5),0)/4;return c28>0?Math.round(a7/c28*100)/100:null}
function getStatus(ff){if(ff.length<14)return{s:"Insuficient",c:"var(--tm)",i:"❓",d:"Mínim 2 setmanes de dades"};const l=ff[ff.length-1],p=ff.length>10?ff[ff.length-10]:ff[0],t=l.ctl-p.ctl;const r7=acts.filter(a=>dS(a.date)<=7);if(r7.length===0&&l.atl<5)return{s:"Desentrenament",c:"var(--dn)",i:"📉",d:"Sense activitat recent"};if(l.tsb>15&&l.ctl>20)return{s:"Peaking",c:"var(--bu)",i:"⭐",d:"Fresc i en forma!"};if(l.tsb<-20)return{s:"Sobrecarregat",c:"var(--dn)",i:"🔴",d:"Fatiga alta. Descansa."};if(t>1)return{s:"Productiu",c:"var(--ok)",i:"🟢",d:"Fitness pujant!"};if(Math.abs(t)<=1&&l.ctl>10)return{s:"Manteniment",c:"var(--bu)",i:"🔵",d:"Fitness estable."};if(t<-1)return{s:"Recuperació",c:"var(--wn)",i:"🟡",d:"Cos recuperant-se."};return{s:"Base",c:"var(--ts)",i:"⚪",d:"Construint base."}}
function calcPRs(){const prs={};const dists=[{n:"1 km",k:1},{n:"5 km",k:5},{n:"10 km",k:10},{n:"Mitja",k:21.0975},{n:"Marató",k:42.195}];dists.forEach(rd=>{const el=acts.filter(a=>a.distance&&a.duration&&a.distance>=rd.k*.95);let best=null;el.forEach(a=>{const t=(a.pace||a.duration/a.distance)*rd.k;if(!best||t<best.time)best={time:t,date:a.date}});prs[rd.n]=best});return prs}
function calcPredictions(prs){const dists=[{n:"1 km",k:1},{n:"5 km",k:5},{n:"10 km",k:10},{n:"Mitja",k:21.0975},{n:"Marató",k:42.195}];let ref=null;for(const d of dists){const p=prs[d.n];if(p)ref={t:p.time,d:d.k}}if(!ref)return null;return dists.map(d=>({n:d.n,k:d.k,t:Math.round(ref.t*Math.pow(d.k/ref.d,1.06))}))}
function calcStreaks(){if(!acts.length)return{cur:0,best:0};const dates=[...new Set(acts.map(a=>a.date))].sort();let c=1,b=1;for(let i=1;i<dates.length;i++){const diff=Math.round((new Date(dates[i])-new Date(dates[i-1]))/864e5);if(diff===1){c++;if(c>b)b=c}else c=1}const last=dates[dates.length-1];return{cur:dS(last)<=1?c:0,best:b}}
function getS28(){const r=acts.filter(a=>dS(a.date)<=28);return{km:r.reduce((s,a)=>s+(a.distance||0),0),dur:r.reduce((s,a)=>s+(a.duration||0),0),trimp:r.reduce((s,a)=>s+(a.trimp||0),0),asc:r.reduce((s,a)=>s+(a.ascent||0),0),pace:r.filter(a=>a.pace).length?r.filter(a=>a.pace).reduce((s,a)=>s+a.pace,0)/r.filter(a=>a.pace).length:null,hr:r.filter(a=>a.avgHR).length?Math.round(r.filter(a=>a.avgHR).reduce((s,a)=>s+a.avgHR,0)/r.filter(a=>a.avgHR).length):null,n:r.length}}

function genPlan(){
  const tips=[],plan=[];
  const r28=acts.filter(a=>dS(a.date)<=28),r56=acts.filter(a=>dS(a.date)<=56);
  if(acts.length<3)return{tips:[{t:"info",i:"📥",x:"Importa almenys 3 activitats."}],plan:[{d:"Dm",t:"easy",n:"Fàcil",x:"30-40min Z2",km:6},{d:"Dj",t:"easy",n:"Fàcil+strides",x:"35min Z2",km:7},{d:"Dv",t:"tempo",n:"Fartlek",x:"4×2min Z3",km:7},{d:"Dg",t:"long",n:"Llarga",x:"60min Z1-Z2",km:12}],wk:32,sum:"Pla genèric"};
  const wV={};r56.forEach(a=>{const w=wK(a.date);wV[w]=(wV[w]||0)+(a.distance||0)});
  const vols=Object.values(wV),avgV=vols.length?vols.reduce((s,v)=>s+v,0)/vols.length:0;
  const wHR=r28.filter(a=>a.hrZone!==null),zC=[0,0,0,0,0];wHR.forEach(a=>zC[a.hrZone]++);
  const tHR=wHR.length||1,eP=((zC[0]+zC[1])/tHR)*100;
  if(avgV>20)tips.push({t:"success",i:"✅",x:"Volum estable ~"+avgV.toFixed(0)+" km/set."});
  if(eP<75&&wHR.length>=5)tips.push({t:"warning",i:"💓",x:eP.toFixed(0)+"% fàcil. Busca 80/20."});
  else if(eP>=75&&wHR.length>=5)tips.push({t:"success",i:"💚",x:"Bona polarització: "+eP.toFixed(0)+"% Z1-Z2."});
  tips.push({t:"tip",i:"💡",x:"Consistència > intensitat."});
  const tKm=Math.min(avgV*1.05,settings.weeklyTarget*1.1),lK=Math.round(tKm*.3),eK=Math.round((tKm-lK)/3);
  plan.push({d:"Dl",t:"rest",n:"Descans",x:"Descans o cross-training",km:0});
  plan.push({d:"Dm",t:"easy",n:"Fàcil",x:"Z2 estable",km:eK});
  plan.push({d:"Dc",t:"quality",n:"Fartlek",x:"5×(2min Z3 / 2min Z1)",km:Math.round(tKm*.17)});
  plan.push({d:"Dv",t:"easy",n:"Fàcil+strides",x:"Z2 + 4×100m",km:eK});
  plan.push({d:"Dg",t:"long",n:"Tirada llarga",x:"Z1-Z2 constant",km:lK});
  return{tips:tips,plan:plan,wk:plan.reduce((s,p)=>s+p.km,0),sum:plan.reduce((s,p)=>s+p.km,0)+" km · "+plan.filter(p=>p.km>0).length+" sessions"};
}

  document.getElementById("statusBadge").style.cssText="color:"+st.c+";background:"+st.c+"20;font-size:10px";
  // Week progress

  document.getElementById("weekBar").style.width=wkPct+"%";
  // Tabs
  document.getElementById("tabs").innerHTML=TABS.map(t=>"<button class='"+(curTab===t.id?"active":"")+"' onclick='switchTab(\""+t.id+"\")'>"+t.l+"</button>").join("");
  // Content
  Object.keys(charts).forEach(k=>destroyChart(k));
  const m=document.getElementById("main");

  }else if(connected){
    h+="<button class='btn' onclick='stravaFetchActivities()' style='margin-right:8px'>🔄 Sincronitzar ara</button>";
    h+="<button onclick='stravaDisconnect()' style='background:rgba(229,56,59,.08);border:1px solid rgba(229,56,59,.2);border-radius:8px;padding:8px 16px;color:var(--dn);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit'>Desconnectar</button>";
  }else{
    h+="<button class='btn' onclick='stravaConnect()'>🔗 Connectar amb Strava</button>";
  }
  h+="<div id='stravaMsg' style='margin-top:10px'></div></div>";
  // CSV
  h+="<div class='card'><div style='font-weight:700;font-size:15px;margin-bottom:12px'>📁 CSV de Garmin / Strava</div>";
  h+="<div style='font-size:12px;color:var(--ts);line-height:1.7;margin-bottom:14px;padding:10px 12px;background:var(--bg);border-radius:8px'><b>Garmin:</b> connect.garmin.com → Activitats → ⬇ CSV<br><b>Strava:</b> Configuració → Descarregar dades</div>";
  h+="<label class='btn' style='display:inline-flex;cursor:pointer'>📄 Selecciona CSV<input type='file' accept='.csv' onchange='handleCSV(event)' style='display:none'></label>";
  h+="<div id='impMsg'></div></div>";
  // Manual
  h+="<div class='card'><div style='font-weight:700;font-size:15px;margin-bottom:12px'>✏️ Entrada manual</div>";
  h+="<div class='form-grid'>";
  h+="<div><label>Data*</label><input type='date' id='fDate' value='"+dateStr(new Date())+"'></div>";
  h+="<div><label>Títol</label><input id='fTitle' placeholder='Cursa fàcil'></div>";
  h+="<div><label>Dist (km)*</label><input type='number' step='.1' id='fDist' placeholder='10.5'></div>";
  h+="<div><label>Durada</label><input id='fDur' placeholder='0:55:30'></div>";
  h+="<div><label>FC mitj</label><input type='number' id='fHR' placeholder='145'></div>";
  h+="<div><label>Ritme (M:SS)</label><input id='fPace' placeholder='5:15'></div>";
  h+="<div><label>D+ (m)</label><input type='number' id='fAsc' placeholder='350'></div>";
  h+="</div><button class='btn' style='margin-top:14px;width:100%' onclick='addManual()'>+ Afegir</button></div></div>";
  m.innerHTML=h;
}

function renderCfg(m){
  const zb=settings.zones||karv(settings.hrMax,settings.hrRest);
  const bounds=[{l:settings.hrRest,h:zb[0]},{l:zb[0],h:zb[1]},{l:zb[1],h:zb[2]},{l:zb[2],h:zb[3]},{l:zb[3],h:settings.hrMax}];
  const zNames=["Z1 Recup","Z2 Aeròb","Z3 Tempo","Z4 Llind","Z5 VO₂max"];
  const zCols=["#7BC8F6","#4CAF50","#FFD600","#FF9800","#F44336"];
  let h="<div class='tab-content'><div class='sec-title'>Perfil</div><div class='sec-sub'>Configuració i zones FC</div>";
  h+="<div class='card'><div class='form-grid'>";
  h+="<div><label>Nom</label><input value='"+settings.name+"' onchange='updSet(\"name\",this.value)'></div>";
  h+="<div><label>FC Màx</label><input type='number' value='"+settings.hrMax+"' onchange='updSet(\"hrMax\",+this.value)'></div>";
  h+="<div><label>FC Repòs</label><input type='number' value='"+settings.hrRest+"' onchange='updSet(\"hrRest\",+this.value)'></div>";
  h+="<div><label>Obj setm (km)</label><input type='number' value='"+settings.weeklyTarget+"' onchange='updSet(\"weeklyTarget\",+this.value)'></div>";
  h+="<div><label>Obj anual (km)</label><input type='number' value='"+settings.yearlyGoal+"' onchange='updSet(\"yearlyGoal\",+this.value)'></div>";
  h+="<div><label>Pes (kg)</label><input type='number' value='"+settings.weight+"' onchange='updSet(\"weight\",+this.value)'></div>";
  h+="</div></div>";
  // Strava API
  h+="<div class='card' style='border-left:4px solid #FC4C02'><h3 style='margin-bottom:12px'>Strava API</h3>";
  h+="<div style='font-size:12px;color:var(--ts);line-height:1.7;margin-bottom:12px;padding:10px 12px;background:var(--bg);border-radius:8px'>Ves a <b>strava.com/settings/api</b> per obtenir les credencials. Callback domain: <b>ffontsere.github.io</b></div>";
  h+="<div class='form-grid'>";
  h+="<div><label>Client ID</label><input value='"+(settings.stravaClientId||"")+"' onchange='updSet(\"stravaClientId\",this.value)'></div>";
  h+="<div><label>Client Secret</label><input type='password' value='"+(settings.stravaSecret||"")+"' onchange='updSet(\"stravaSecret\",this.value)' placeholder='Entra el secret aquí'></div>";
  h+="</div>";
  if(settings.stravaToken)h+="<div style='margin-top:8px;font-size:12px;color:var(--ok)'>✅ Connectat · Token vàlid fins "+new Date(settings.stravaExpires*1000).toLocaleString("ca")+"</div>";
  h+="</div>";
  // Zones
  h+="<div class='card'><div style='display:flex;justify-content:space-between;align-items:center;margin-bottom:12px'><h3 style='margin:0'>Zones FC</h3><button class='btn' style='padding:5px 12px;font-size:11px;border-radius:8px' onclick='resetZones()'>Recalcular Karvonen</button></div>";
  zNames.forEach((n,i)=>{
    h+="<div style='display:flex;align-items:center;gap:8px;margin-bottom:8px'><div style='width:10px;height:10px;border-radius:3px;background:"+zCols[i]+"'></div><div style='width:80px;font-size:12px;font-weight:600'>"+n+"</div><div style='flex:1;height:6px;background:var(--bg);border-radius:3px;overflow:hidden'><div style='width:"+Math.max(0,Math.min(100,(bounds[i].h-bounds[i].l)/(settings.hrMax-settings.hrRest)*100))+"%;height:100%;background:"+zCols[i]+";border-radius:3px'></div></div><span style='font-size:12px;color:var(--tm);min-width:28px;text-align:right'>"+bounds[i].l+"</span><span style='font-size:10px;color:var(--tm)'>–</span>";
    if(i<4)h+="<input type='number' value='"+bounds[i].h+"' onchange='updZone("+i+",+this.value)' style='width:55px;padding:4px 6px;text-align:center;font-size:12px;font-weight:700;color:"+zCols[i]+";background:var(--bg);border:1px solid var(--bd);border-radius:6px;outline:none'>";
    else h+="<span style='width:55px;text-align:center;font-size:12px;font-weight:700;color:"+zCols[i]+"'>"+bounds[i].h+"</span>";
    h+="</div>";
  });
  h+="<div style='font-size:11px;color:var(--tm);margin-top:8px'>"+(settings.zones?"🎛️ Personalitzades":"📐 Karvonen")+"</div></div>";
  h+="<div class='card'><button onclick='clearAll()' style='background:rgba(229,56,59,.08);border:1px solid rgba(229,56,59,.2);border-radius:8px;padding:8px 16px;color:var(--dn);font-size:12px;font-weight:700;cursor:pointer'>Esborrar tot ("+acts.length+" act.)</button></div></div>";
  m.innerHTML=h;
}

function statHTML(l,v,u,c){return"<div class='stat'><div class='label'>"+l+"</div><div class='val' style='color:"+c+"'>"+v+"</div>"+(u?"<div class='unit'>"+u+"</div>":"")+"</div>"}

// ═══ ACTIONS ═══
function handleCSV(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=function(ev){
    try{
      const p=parseCSV(ev.target.result);
      if(!p.length){document.getElementById("impMsg").innerHTML="<div style='margin-top:10px;padding:8px 12px;border-radius:8px;font-size:12px;background:rgba(229,56,59,.08);color:var(--dn)'>Cap activitat trobada.</div>";return}
      const ex=new Set(acts.map(a=>a.date+"_"+a.distance));
      const nw=p.filter(a=>!ex.has(a.date+"_"+a.distance));
      acts=acts.concat(nw).sort((a,b)=>a.date.localeCompare(b.date));
      saveActs();
      document.getElementById("impMsg").innerHTML="<div style='margin-top:10px;padding:8px 12px;border-radius:8px;font-size:12px;background:rgba(0,184,101,.08);color:var(--ok)'>"+nw.length+" noves activitats importades.</div>";
      render();
    }catch(err){document.getElementById("impMsg").innerHTML="<div style='margin-top:10px;padding:8px 12px;border-radius:8px;font-size:12px;background:rgba(229,56,59,.08);color:var(--dn)'>Error: "+err.message+"</div>"}
  };
  r.readAsText(f);e.target.value="";
}

function addManual(){
  const dt=document.getElementById("fDate").value,dist=parseFloat(document.getElementById("fDist").value);
  if(!dt||isNaN(dist))return;
  const dur=pD(document.getElementById("fDur").value),hr=document.getElementById("fHR").value?+document.getElementById("fHR").value:null;
  let pace=pP(document.getElementById("fPace").value);if(!pace&&dur&&dist>0)pace=dur/dist;
  const asc=document.getElementById("fAsc").value?+document.getElementById("fAsc").value:null;
  const trimp=cTR(dur?dur/60:null,hr,settings.hrMax,settings.hrRest);
  acts.push({id:"m-"+Date.now(),date:dt,title:document.getElementById("fTitle").value||"Cursa",distance:dist,duration:dur,avgHR:hr?Math.round(hr):null,maxHR:null,pace:pace,ascent:asc,cadence:null,trimp:trimp,vo2:estVO2(pace,hr,settings.hrMax),hrZone:hr?hZ(hr,settings.hrMax,settings.hrRest,settings.zones):null,source:"manual"});
  acts.sort((a,b)=>a.date.localeCompare(b.date));saveActs();curTab="feed";render();
}

function delAct(id){acts=acts.filter(a=>a.id!==id);saveActs();render()}
function clearAll(){if(confirm("Esborrar TOTES les activitats?")){acts=[];saveActs();render()}}
function updSet(k,v){settings[k]=v;saveSettings();if(k!=="stravaSecret"&&k!=="stravaClientId")render()}
function updZone(i,v){const cur=settings.zones||karv(settings.hrMax,settings.hrRest);const nz=[...cur];nz[i]=v;for(let j=i+1;j<4;j++){if(nz[j]<=nz[j-1])nz[j]=nz[j-1]+1}if(nz[0]<=settings.hrRest)nz[0]=settings.hrRest+1;settings.zones=nz;recalcAllZones();saveSettings();render()}
function resetZones(){settings.zones=karv(settings.hrMax,settings.hrRest);recalcAllZones();saveSettings();render()}
function recalcAllZones(){acts.forEach(a=>{if(a.avgHR)a.hrZone=hZ(a.avgHR,settings.hrMax,settings.hrRest,settings.zones);a.vo2=estVO2(a.pace,a.avgHR,settings.hrMax)});saveActs()}

// ═══ STRAVA INTEGRATION ═══
const STRAVA_REDIRECT=window.location.origin+window.location.pathname;

function stravaConnect(){
  if(!settings.stravaClientId||!settings.stravaSecret){alert("Configura Client ID i Client Secret a la pestanya Perfil primer.");return}
  const url="https://www.strava.com/oauth/authorize?client_id="+settings.stravaClientId+"&redirect_uri="+encodeURIComponent(STRAVA_REDIRECT)+"&response_type=code&approval_prompt=auto&scope=activity:read_all";
  window.location.href=url;
}

async function stravaExchangeToken(code){
  const msg=document.getElementById("stravaMsg");
  if(msg)msg.innerHTML="<div style='padding:8px 12px;border-radius:8px;font-size:12px;background:rgba(45,113,230,.08);color:var(--bu)'>Connectant amb Strava...</div>";
  try{
    const resp=await fetch("https://www.strava.com/oauth/token",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({client_id:settings.stravaClientId,client_secret:settings.stravaSecret,code:code,grant_type:"authorization_code"})});
    if(!resp.ok)throw new Error("Error "+resp.status);
    const data=await resp.json();
    settings.stravaToken=data.access_token;
    settings.stravaRefresh=data.refresh_token;
    settings.stravaExpires=data.expires_at;
    saveSettings();
    if(msg)msg.innerHTML="<div style='padding:8px 12px;border-radius:8px;font-size:12px;background:rgba(0,184,101,.08);color:var(--ok)'>✓ Connectat a Strava com a "+((data.athlete&&data.athlete.firstname)||"atleta")+"!</div>";
    await stravaFetchActivities();
  }catch(err){
    if(msg)msg.innerHTML="<div style='padding:8px 12px;border-radius:8px;font-size:12px;background:rgba(229,56,59,.08);color:var(--dn)'>Error: "+err.message+". Comprova el Client Secret a Perfil.</div>";
  }
}

async function stravaRefreshToken(){
  if(!settings.stravaRefresh)return false;
  try{
    const resp=await fetch("https://www.strava.com/oauth/token",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({client_id:settings.stravaClientId,client_secret:settings.stravaSecret,refresh_token:settings.stravaRefresh,grant_type:"refresh_token"})});
    if(!resp.ok)return false;
    const data=await resp.json();
    settings.stravaToken=data.access_token;
    settings.stravaRefresh=data.refresh_token;
    settings.stravaExpires=data.expires_at;
    saveSettings();
    return true;
  }catch{return false}
}

async function stravaEnsureToken(){
  if(!settings.stravaToken)return false;
  if(Date.now()/1000>=settings.stravaExpires-300){return await stravaRefreshToken()}
  return true;
}

function stravaParseActivity(a){
  const dist=a.distance?Math.round(a.distance/10)/100:null; // meters to km
  const dur=a.moving_time||a.elapsed_time||null;
  const avgHR=a.average_heartrate?Math.round(a.average_heartrate):null;
  const maxHR=a.max_heartrate?Math.round(a.max_heartrate):null;
  const asc=a.total_elevation_gain?Math.round(a.total_elevation_gain):null;
  const pace=(dist&&dur&&dist>0)?dur/dist:null;
  const trimp=cTR(dur?dur/60:null,avgHR,settings.hrMax,settings.hrRest);
  const vo2=estVO2(pace,avgHR,settings.hrMax);
  const d=new Date(a.start_date_local||a.start_date);
  return{
    id:"strava-"+a.id,
    date:dateStr(d),
    title:a.name||"Cursa",
    distance:dist,
    duration:dur,
    avgHR:avgHR,
    maxHR:maxHR,
    pace:pace,
    ascent:asc,
    cadence:a.average_cadence?Math.round(a.average_cadence*2):null,
    trimp:trimp,
    vo2:vo2,
    hrZone:avgHR?hZ(avgHR,settings.hrMax,settings.hrRest,settings.zones):null,
    source:"strava"
  };
}

async function stravaFetchActivities(){
  const msg=document.getElementById("stravaMsg");
  const valid=await stravaEnsureToken();
  if(!valid){
    if(msg)msg.innerHTML="<div style='padding:8px 12px;border-radius:8px;font-size:12px;background:rgba(229,56,59,.08);color:var(--dn)'>Token expirat. Reconnecta amb Strava.</div>";
    return;
  }
  if(msg)msg.innerHTML="<div style='padding:8px 12px;border-radius:8px;font-size:12px;background:rgba(45,113,230,.08);color:var(--bu)'>⏳ Sincronitzant activitats de Strava...</div>";
  try{
    // Find latest strava activity date to use as 'after' filter
    const stravaActs=acts.filter(a=>a.source==="strava");
    let afterEpoch=0;
    if(stravaActs.length>0){
      const lastDate=stravaActs.reduce((latest,a)=>a.date>latest?a.date:latest,stravaActs[0].date);
      afterEpoch=Math.floor(new Date(lastDate).getTime()/1000);
    }

    let allFetched=[],page=1,hasMore=true;
    while(hasMore&&page<=10){
      let url="https://www.strava.com/api/v3/athlete/activities?per_page=200&page="+page;
      if(afterEpoch>0)url+="&after="+afterEpoch;
      const resp=await fetch(url,{headers:{"Authorization":"Bearer "+settings.stravaToken}});
      if(resp.status===401){
        // Token invalid, try refresh
        const refreshed=await stravaRefreshToken();
        if(!refreshed)throw new Error("Token invalid. Reconnecta amb Strava.");
        continue; // retry same page with new token
      }
      if(!resp.ok){
        const errBody=await resp.text().catch(()=>"");
        throw new Error("HTTP "+resp.status+(errBody?" - "+errBody.slice(0,100):""));
      }
      const data=await resp.json();
      if(!data||!data.length){hasMore=false;break}
      allFetched=allFetched.concat(data);
      page++;
      if(data.length<200)hasMore=false;
    }

    // Filter only running activities
    const runs=allFetched.filter(a=>{
      const t=(a.sport_type||a.type||"").toLowerCase();
      return t==="run"||t==="trailrun"||t==="trail_run"||t==="virtualrun"||t==="virtual_run"||t==="treadmill";
    });

    const parsed=runs.map(stravaParseActivity);

    // Deduplicate by strava ID and by date+distance
    const existingIds=new Set(acts.map(a=>a.id));
    const existingDates=new Set(acts.map(a=>a.date+"_"+a.distance));
    const newActs=parsed.filter(a=>!existingIds.has(a.id)&&!existingDates.has(a.date+"_"+a.distance));

    if(newActs.length>0){
      acts=acts.concat(newActs).sort((a,b)=>a.date.localeCompare(b.date));
      saveActs();
    }

    if(msg)msg.innerHTML="<div style='padding:8px 12px;border-radius:8px;font-size:12px;background:rgba(0,184,101,.08);color:var(--ok)'>✓ "+newActs.length+" noves activitats importades"+(allFetched.length>0?" ("+allFetched.length+" totals, "+runs.length+" runs)":"")+".</div>";
    render();
  }catch(err){
    if(msg)msg.innerHTML="<div style='padding:8px 12px;border-radius:8px;font-size:12px;background:rgba(229,56,59,.08);color:var(--dn)'>Error: "+err.message+"</div>";
  }
}

function stravaDisconnect(){
  settings.stravaToken="";settings.stravaRefresh="";settings.stravaExpires=0;
  saveSettings();render();
}

// ═══ INIT ═══
load();

// Handle Strava OAuth callback
(function(){
  const params=new URLSearchParams(window.location.search);
  const code=params.get("code");
  if(code){
    window.history.replaceState({},"",window.location.pathname);
    curTab="imp";
    render();
    setTimeout(()=>stravaExchangeToken(code),300);
    return;
  }
})();

render();

// Service Worker
if("serviceWorker"in navigator){navigator.serviceWorker.register("sw.js").catch(()=>{})}
</script>
