<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RunTracker">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#F7F3EA" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#1C1A17" media="(prefers-color-scheme: dark)">
<title>RunTracker</title>
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>
:root{
  /* Berry & Indigo on warm cream */
  --primary:#D11E6B;--on-primary:#FFFFFF;--primary-container:#FFD9E6;--on-primary-container:#3E0021;
  --secondary:#4A4FB5;--secondary-container:#E0E0FF;--on-secondary-container:#0A0C57;
  --tertiary:#8E2DA8;--tertiary-container:#F6D9FF;--on-tertiary-container:#33004A;
  --error:#BA1A1A;--error-container:#FFDAD6;--on-error-container:#410002;
  --accent2:#00A6A6;
  --surface:#F7F3EA;--on-surface:#241F1A;--on-surface-var:#6A6258;
  --surface-c-low:#FFFFFF;--surface-c:#FBF7EF;--surface-c-high:#F0E9DB;--surface-c-highest:#EAE2D2;
  --outline:#9C9286;--outline-var:#E4DBCB;
  --accent:#D11E6B;--warn:#9A5B00;--warn-c:#FFE6C4;--ok:#1E7D52;
  --grad:linear-gradient(120deg,#D11E6B,#4A4FB5);
  --serif:'Fraunces',Georgia,serif;
  --r-xs:8px;--r-s:12px;--r-m:16px;--r-l:24px;--r-xl:28px;
  --or:#D11E6B;--bg:var(--surface-c-high);--cd:var(--surface-c-low);--tx:var(--on-surface);--ts:var(--on-surface-var);--tm:var(--on-surface-var);--bd:var(--outline-var);--bu:#4A4FB5;--dn:#BA1A1A;--pu:#8E2DA8;
  --orBg:var(--primary-container);--buBg:var(--secondary-container);--okBg:#C7F0DB;--wnBg:var(--warn-c);--dnBg:var(--error-container);--puBg:var(--tertiary-container);
}
@media(prefers-color-scheme:dark){:root{
  --primary:#FF8AB8;--on-primary:#5E0033;--primary-container:#8A0F4A;--on-primary-container:#FFD9E6;
  --secondary:#BFC2FF;--secondary-container:#32379C;--on-secondary-container:#E0E0FF;
  --tertiary:#EBA9FF;--tertiary-container:#71278A;--on-tertiary-container:#F6D9FF;
  --error:#FFB4AB;--error-container:#93000A;--on-error-container:#FFDAD6;
  --surface:#1C1A17;--on-surface:#EDE6DC;--on-surface-var:#D2C8B8;
  --surface-c-low:#241F1A;--surface-c:#28231E;--surface-c-high:#332D26;--surface-c-highest:#3E3730;
  --outline:#9C9286;--outline-var:#4E463C;
  --warn:#FFB951;--warn-c:#5C3D00;--ok:#7FD6A8;
  --grad:linear-gradient(120deg,#FF8AB8,#BFC2FF);
  --or:#FF8AB8;--bu:#BFC2FF;--dn:#FFB4AB;--pu:#EBA9FF;
  --bg:var(--surface-c-high);--cd:var(--surface-c-low);
  --orBg:var(--primary-container);--buBg:var(--secondary-container);--okBg:#0E4F30;--wnBg:var(--warn-c);--dnBg:var(--error-container);--puBg:var(--tertiary-container);
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{overflow-x:hidden}
body{font-family:'Inter','Segoe UI',system-ui,sans-serif;background:var(--surface);color:var(--on-surface);overflow-x:hidden;max-width:100vw}
.ico{display:inline-flex;align-items:center;justify-content:center;vertical-align:middle}.ico svg{width:1em;height:1em;fill:currentColor;display:block}

/* Top App Bar (M3 small, collapsing feel) */
.topbar{background:var(--surface);position:sticky;top:0;z-index:100;padding:env(safe-area-inset-top,8px) 4px 0}
.topbar-inner{max-width:720px;margin:0 auto;padding:8px 12px;overflow:hidden}
.appbar{display:flex;align-items:center;justify-content:space-between;min-height:56px;gap:10px;flex-wrap:nowrap}
.appbar-title{display:flex;align-items:center;gap:8px;min-width:0;flex-shrink:1}
.appbar-title .brand{font-family:var(--serif);font-size:22px;font-weight:700;letter-spacing:-.01em;color:var(--on-surface);white-space:nowrap}
.appbar-title .logo-badge{width:34px;height:34px;border-radius:10px;background:var(--primary-container);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.appbar-title .logo-badge .ico{color:var(--on-primary-container);font-size:22px}
.status-chip{display:none}
.week-pill{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;min-width:96px}
.week-pill .km{font-size:12px;color:var(--on-surface-var);font-weight:500;white-space:nowrap}
.week-pill .km b{color:var(--on-surface);font-weight:700}
.week-track{width:90px;height:6px;background:var(--surface-c-high);border-radius:3px;overflow:hidden;flex-shrink:0}
.week-track>div{height:100%;background:var(--primary);border-radius:3px;transition:width .5s cubic-bezier(.2,0,0,1)}
.save-toast{position:fixed;left:50%;bottom:calc(96px + env(safe-area-inset-bottom,0));transform:translateX(-50%) translateY(20px);background:var(--ok);color:#fff;padding:10px 20px;border-radius:24px;font-size:14px;font-weight:700;z-index:300;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;box-shadow:0 4px 16px rgba(0,0,0,.25)}
.save-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Main */
.main{max-width:720px;margin:0 auto;padding:8px 16px calc(96px + env(safe-area-inset-bottom,0))}

/* Bottom Navigation Bar (M3) */
.navbar{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--surface-c);display:flex;justify-content:space-around;align-items:center;height:80px;padding-bottom:env(safe-area-inset-bottom,0);box-shadow:0 -1px 0 var(--outline-var)}
.navbar-inner{max-width:720px;margin:0 auto;width:100%;display:flex;justify-content:space-around}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 0 0;background:none;border:none;cursor:pointer;font-family:inherit;color:var(--on-surface-var);position:relative}
.nav-item .pill{display:flex;align-items:center;justify-content:center;width:64px;height:32px;border-radius:16px;transition:background .2s}
.nav-item .ico{font-size:24px}
.nav-item .nav-label{font-size:12px;font-weight:600;letter-spacing:.01em}
.nav-item.active{color:var(--on-surface)}
.nav-item.active .pill{background:var(--primary-container)}
.nav-item.active .ico{color:var(--on-primary-container)}
.nav-item.active .nav-label{color:var(--on-surface)}

/* Cards — M3 filled/elevated */
.card{background:var(--surface-c-low);border-radius:var(--r-m);padding:16px;margin-bottom:12px}
.card.elevated{background:var(--surface-c-low);box-shadow:0 1px 3px rgba(0,0,0,.12),0 1px 2px rgba(0,0,0,.04)}
.card h3{font-size:14px;font-weight:600;color:var(--on-surface);margin-bottom:12px;letter-spacing:0}

/* Hero banner (primary container, not gradient clone) */
.banner{background:var(--grad);color:#fff;border-radius:var(--r-l);padding:22px 24px;margin-bottom:16px;position:relative;overflow:hidden}
.banner .bg-icon{position:absolute;right:-8px;bottom:-20px;font-size:130px;opacity:.13}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.stat{background:var(--surface-c-low);border-radius:var(--r-s);padding:14px 12px;text-align:center}
.stat .label{font-size:11px;color:var(--on-surface-var);font-weight:500}
.stat .val{font-family:var(--serif);font-size:22px;font-weight:600;margin:3px 0;color:var(--on-surface)}
.stat .unit{font-size:10px;color:var(--on-surface-var)}
.badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:8px;font-size:11px;font-weight:600;letter-spacing:.01em}
.tip{border-radius:var(--r-s);padding:14px;margin-bottom:8px;display:flex;gap:10px;align-items:flex-start;font-size:13px;line-height:1.5}

/* Activity cards */
.act-card{background:var(--surface-c-low);border-radius:var(--r-m);margin-bottom:10px;overflow:hidden;position:relative;transition:transform .15s,background .15s}
.act-card:active{transform:scale(.985);background:var(--surface-c)}
.act-head{display:flex;justify-content:space-between;align-items:center;padding:14px 16px 10px}
.act-icon{width:40px;height:40px;border-radius:12px;background:var(--tertiary-container);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.act-icon .ico{color:var(--on-tertiary-container);font-size:22px}
.act-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(85px,1fr))}
.act-stats>div{padding:10px 16px}
.act-stats .al{font-size:11px;color:var(--on-surface-var);font-weight:500}
.act-stats .av{font-size:16px;font-weight:700;color:var(--on-surface)}
.plan-item{background:var(--surface-c-low);border-radius:var(--r-s);border-left:4px solid var(--primary);padding:14px 16px;margin-bottom:8px;display:flex;gap:14px;align-items:flex-start}

/* Forms — M3 outlined fields */
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.form-grid label{font-size:12px;color:var(--on-surface-var);font-weight:500;display:block;margin-bottom:5px}
.form-grid input,.form-grid select{background:var(--surface);border:1px solid var(--outline);border-radius:var(--r-xs);padding:12px 14px;font-size:15px;width:100%;outline:none;font-family:inherit;color:var(--on-surface)}
.form-grid input:focus,.form-grid select:focus{border-color:var(--primary);border-width:2px;padding:11px 13px}

/* Buttons — M3 */
.btn{background:var(--primary);border:none;border-radius:20px;padding:12px 24px;color:var(--on-primary);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:8px;transition:filter .15s,transform .1s;position:relative;overflow:hidden}
.btn:active{transform:scale(.97);filter:brightness(.92)}
.btn .ico{font-size:18px}
.btn-tonal{background:var(--secondary-container);color:var(--on-secondary-container)}
.btn-outline{background:transparent;border:1px solid var(--outline);color:var(--primary)}

/* FAB */
.fab{position:fixed;right:16px;bottom:calc(96px + env(safe-area-inset-bottom,0));z-index:99;width:56px;height:56px;border-radius:18px;background:var(--primary-container);color:var(--on-primary-container);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 8px rgba(0,0,0,.18);transition:transform .15s}
.fab:active{transform:scale(.92)}
.fab .ico{font-size:26px}

.chart-box{position:relative;width:100%;height:200px;margin-bottom:8px}
.sec-title{font-family:var(--serif);font-size:30px;font-weight:600;letter-spacing:-.01em;margin-bottom:2px;color:var(--on-surface)}
.sec-sub{font-size:14px;color:var(--on-surface-var);margin-bottom:16px}
.heatmap{display:flex;gap:3px;overflow-x:auto;padding-bottom:8px}
.heatmap-col{display:flex;flex-direction:column;gap:3px}
.heatmap-cell{width:14px;height:14px;border-radius:4px}
.badge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
.badge-item{padding:14px 10px;border-radius:var(--r-s);background:var(--surface-c-low);text-align:center}
.badge-item.earned{background:var(--primary-container)}
.badge-item.locked{opacity:.4}
.hidden{display:none}
.progress-bar{height:8px;background:var(--surface-c-high);border-radius:4px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;border-radius:4px;transition:width .6s cubic-bezier(.2,0,0,1)}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
.tab-content{animation:fadeIn .35s cubic-bezier(.2,0,0,1)}
.skeleton{background:linear-gradient(90deg,var(--surface-c) 25%,var(--surface-c-high) 50%,var(--surface-c) 75%);background-size:800px 100%;animation:shimmer 1.4s infinite;border-radius:var(--r-s)}
.del-btn{background:none;border:none;color:var(--on-surface-var);cursor:pointer;padding:6px;display:flex;align-items:center;border-radius:50%}
.del-btn .ico{font-size:20px}
.help-tag{display:inline-flex;align-items:center;gap:3px;cursor:pointer;border-bottom:1px dashed var(--on-surface-var)}
.help-tag::after{content:"ⓘ";font-size:13px;color:var(--tertiary);border:none;margin-left:2px}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s ease}
/* Hero summary row (Progress) */
.hero-summary{background:var(--surface-c-low);border-radius:var(--r-l);padding:4px;margin-bottom:16px;overflow:hidden}
.hero-main{display:flex;align-items:center;gap:16px;padding:20px 20px 16px}
.hero-main .big{font-family:var(--serif);font-size:44px;font-weight:600;line-height:1;color:var(--primary);letter-spacing:-.01em}
.hero-main .big .u{font-size:16px;font-weight:500;color:var(--on-surface-var);margin-left:4px}
.hero-main .meta{flex:1}
.hero-main .meta .lbl{font-size:13px;color:var(--on-surface-var);font-weight:500}
.hero-ring{width:64px;height:64px;flex-shrink:0}
.hero-row{display:flex;border-top:1px solid var(--outline-var)}
.hero-row .cell{flex:1;padding:14px 8px;text-align:center;border-right:1px solid var(--outline-var)}
.hero-row .cell:last-child{border-right:none}
.hero-row .cell .ci{color:var(--on-surface-var);margin-bottom:4px}
.hero-row .cell .cv{font-size:17px;font-weight:700;color:var(--on-surface)}
.hero-row .cell .cl{font-size:11px;color:var(--on-surface-var);font-weight:500;margin-top:1px}
/* Scrollable nav (swipe) */
.navbar.scrollable{padding:0}
.navbar.scrollable .navbar-inner{justify-content:flex-start;overflow-x:auto;scroll-snap-type:x proximity;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding:0 4px}
.navbar.scrollable .navbar-inner::-webkit-scrollbar{display:none}
.navbar.scrollable .nav-item{flex:0 0 auto;min-width:72px;scroll-snap-align:center}
.modal-card{background:var(--surface-c-high);border-radius:var(--r-xl) var(--r-xl) 0 0;max-width:720px;width:100%;max-height:75vh;overflow-y:auto;padding:20px 22px calc(32px + env(safe-area-inset-bottom,0));animation:fadeIn .25s cubic-bezier(.2,0,0,1)}
.modal-card h2{font-size:20px;font-weight:600;margin-bottom:8px;color:var(--on-surface)}
.modal-card .mdesc{font-size:14px;color:var(--on-surface-var);line-height:1.7;margin-bottom:16px}

/* ═══ Acordions (redisseny) ═══ */
.card.acc{padding:0;overflow:hidden}
.acc-head{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:14px 16px;user-select:none}
.acc-title{font-weight:800;font-size:14px}
.acc-sub{font-size:11px;color:var(--tm);margin-top:2px}
.acc-chev{transition:transform .2s;color:var(--outline);font-size:14px}
.acc.open .acc-chev{transform:rotate(180deg)}
.acc-body{display:none;padding:2px 12px 12px}
.acc.open .acc-body{display:block}
.acc-body .card{margin:0 0 10px;box-shadow:none;border:1px solid var(--bd)}
/* sub-pestanyes de Progrés */
.subtabs{display:flex;gap:6px;margin-bottom:14px;position:sticky;top:0;z-index:30;background:var(--bg);padding:4px 0}
.subtabs button{flex:1;border:1px solid var(--bd);background:var(--cd);color:var(--ts);border-radius:10px;padding:9px 3px;font-family:inherit;font-size:12px;font-weight:800;cursor:pointer}
.subtabs button.on{background:var(--primary);color:#fff;border-color:var(--primary)}
.subgrp{display:none}.subgrp.on{display:block}
.grp-q{font-family:var(--serif);font-size:15px;font-weight:600;color:var(--ts);background:var(--buBg);border-radius:12px;padding:11px 14px;margin-bottom:12px}
.card-sub{font-size:12px;color:var(--tm);line-height:1.4;margin:-2px 0 10px}
</style>
<div id="helpModal" style="display:none"></div>
</head>
<body>
<div class="topbar"><div class="topbar-inner">
  <div class="appbar">
    <div class="appbar-title">
      <div class="logo-badge ico" style="font-size:22px"><svg viewBox="0 0 24 24" style="width:1em;height:1em;fill:var(--on-primary-container)"><path d="M13.5 5.5a2 2 0 1 0 0-4 2 2 0 0 0 0 4zM9.8 8.9L7 23h2.1l1.8-8 2.1 2v6h2v-7.5l-2.1-2 .6-3c1.3 1.5 3.3 2.5 5.5 2.5v-2c-1.9 0-3.5-1-4.3-2.4l-1-1.6c-.4-.6-1-1-1.7-1-.3 0-.5.1-.8.1L6 4.6V9h2V6.1z"/></svg></div>
      <span class="brand">RunTracker</span>
      <span id="statusBadge" class="status-chip" style="cursor:pointer" onclick="showHelp('status')"></span>
    </div>
    <div class="week-pill">
      <span id="weekMini" class="km"></span>
      <div class="week-track"><div id="weekBar" style="width:0"></div></div>
    </div>
  </div>
</div></div>
<div class="main" id="main"></div>
<button class="fab" id="fab" onclick="fabAction()"></button>
<nav class="navbar scrollable"><div class="navbar-inner" id="navbar"></div></nav>

<script>
// ═══ SVG ICONS (inline, no external font dependency) ═══
const ICONS={
  stopwatch:'<svg viewBox="0 0 24 24"><path d="M15 1H9v2h6V1zm-4 13h2V8h-2v6zm8.03-6.61l1.42-1.42c-.43-.51-.9-.99-1.41-1.41l-1.42 1.42A8.96 8.96 0 0 0 12 4a9 9 0 1 0 9 9c0-2.12-.74-4.07-1.97-5.61zM12 20a7 7 0 1 1 0-14 7 7 0 0 1 0 14z"/></svg>',

  more:'<svg viewBox="0 0 24 24"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg>',

  terrain:'<svg viewBox="0 0 24 24"><path d="M14 6l-3.75 5 2.85 3.8-1.6 1.2C9.81 13.75 7 10 7 10l-6 8h22z"/></svg>',

const GLOSS={
  trimp:{t:"TRIMP — Training Impulse",d:"Mesura la càrrega d'entrenament combinant la durada i la intensitat (freqüència cardíaca). Un TRIMP alt indica una sessió molt exigent. Desenvolupat per Banister (1975).<br><br><b>Valors orientatius:</b><br>• &lt;50: Sessió lleugera / recuperació<br>• 50–100: Sessió moderada<br>• 100–150: Sessió dura<br>• &gt;150: Sessió molt exigent<br><br><b>Fórmula:</b> TRIMP = minuts × %FCReserva × 0.64 × e^(1.92 × %FCReserva)"},
  ctl:{t:"CTL — Chronic Training Load (Fitness)",d:"Mitjana exponencial de la càrrega d'entrenament dels últims ~42 dies. Representa la teva <b>fitness acumulada</b>. Puja lentament amb entrenament consistent i baixa quan deixes d'entrenar.<br><br>Un CTL alt = has entrenat molt i de forma sostinguda."},
  atl:{t:"ATL — Acute Training Load (Fatiga)",d:"Mitjana exponencial de la càrrega dels últims ~7 dies. Representa la <b>fatiga recent</b>. Puja ràpidament després de sessions dures i baixa ràpid amb descans.<br><br>Un ATL alt = estàs fatigat pels entrenaments recents."},
  tsb:{t:"TSB — Training Stress Balance (Forma)",d:"TSB = Fitness (CTL) − Fatiga (ATL). Indica si estàs <b>fresc o fatigat</b>.<br><br><b>Valors:</b><br>• TSB positiu (&gt;10): Estàs fresc, bon moment per competir<br>• TSB ~0: Equilibri entre fitness i fatiga<br>• TSB negatiu (&lt;-10): Fatiga acumulada, cal recuperar<br><br>Per fer 'peaking' (arribar en forma a una cursa), busca un TSB positiu amb CTL alt."},
  acwr:{t:"ACWR — Acute:Chronic Workload Ratio",d:"Ràtio entre la càrrega de l'última setmana i la mitjana de les últimes 4 setmanes. Mesura si estàs augmentant la càrrega massa ràpid.<br><br><b>Zones:</b><br>• &lt;0.8: Càrrega baixa, possible desentrenament<br>• <b>0.8–1.3: Zona òptima ✓</b><br>• 1.3–1.5: Zona de precaució ⚠<br>• &gt;1.5: Alt risc de lesió 🔴<br><br>La regla del 10%: no incrementis més d'un 10% setmanal."},
  vo2curve:{t:"VO₂max mínim de la corba",d:"És una <b>segona estimació</b> del teu VO₂max, calculada a partir de la teva <b>corba d'esforços</b> (els millors ritmes que has sostingut a 5, 10, 20 i 30 minuts), no d'un esforç individual com el VO₂max actual.<br><br><b>Per què \"mínim\"?</b><br>Perquè surt d'esforços d'<b>entrenament</b>, no de competició. Quan fas sèries entrenant, gairebé mai vas al 100% absolut com en una cursa. Per tant, el número és un <b>terra garantit</b>: el teu VO₂max real és com a mínim aquest, i probablement una mica més alt.<br><br><b>En què es diferencia del VO₂max actual?</b><br>El <i>VO₂max actual</i> agafa el millor esforç vàlid recent i l'extrapola. El <i>mínim de corba</i> usa la forma sencera de la teva corba ritme-durada, més robusta a un sol dia bo o dolent.<br><br><b>Com llegir-los junts:</b><br>• Si els dos números són semblants → l'estimació és sòlida.<br>• Si el mínim de corba és bastant més baix → fa temps que no fas un esforç màxim de debò (cursa o test), i el VO₂max actual podria estar una mica inflat per una lectura puntual."},
  cs:{t:"Critical Speed (CS) i D′",d:"Model fisiològic de dos paràmetres derivat de la teva <b>corba de millors esforços</b> (la velocitat màxima que has sostingut 2, 5, 10, 20 i 30 min).<br><br><b>CS (ritme crític):</b> la frontera teòrica entre l'esforç sostenible i el no sostenible — molt proper al teu llindar (LT2/MLSS), però derivat del ritme, sense FC.<br><br><b>D′ (D-prima):</b> la teva reserva anaeròbica en metres: la \"capacitat de dipòsit\" per córrer per sobre de CS abans d'esgotar-te.<br><br><b>Com es calcula:</b> regressió lineal distància = CS·temps + D′ amb les finestres de 2 a 30 min (el domini on el model és vàlid). r² indica la qualitat de l'ajust (>0.98 és bo).<br><br><b>Honestedat:</b> com que surt d'esforços d'<b>entrenament</b> (no de curses), és un límit inferior: el teu CS real probablement és una mica millor.<br><br><b>Per a què serveix:</b> zones per ritme independents de la FC (útils amb calor), seguiment de forma sense tests, i veure si millores per velocitat (D′) o per resistència (CS)."},
  efic:{t:"Eficiència aeròbica — la teva diana de forma",d:"Mesura <b>quanta velocitat produeixes per cada batec del cor</b> en sessions fàcils (Z2). És l'indicador més pràctic de millora real de forma per a un corredor de fons.<br><br><b>Per què és la diana?</b><br>Un entrenador no entrena un número abstracte: entrena capacitats. Si amb el temps corres <b>més ràpid a la mateixa freqüència cardíaca</b> (o la mateixa velocitat amb menys pulsacions), el teu cos s'ha fet més eficient. Això és millora aeròbica de debò.<br><br><b>Com es calcula:</b><br>Velocitat (m/min) dividida per la FC mitjana, només en rodatges fàcils (Z1-Z2) de més de 25 min, amb el ritme <b>corregit</b> per calor, humitat, desnivell i altitud. Com més alt l'índex, millor.<br><br><b>Per què mirar la tendència i no un dia:</b><br>L'índex té soroll (hidratació, son, calor, fatiga). El que importa és la <b>tendència sostinguda de 3-4 setmanes</b>, no una lectura puntual.<br><br><b>Com millorar-la:</b><br>Volum fàcil constant (el motor de la base aeròbica), consistència al llarg de mesos i paciència.<br><br><b>Relació amb el VO₂max:</b><br>L'eficiència és el senyal de seguiment setmanal; el VO₂max és la validació a llarg termini."},
  vo2:{t:"VO₂max — Consum Màxim d'Oxigen",d:"Capacitat màxima del cos per transportar i utilitzar oxigen durant l'exercici. És el <b>millor indicador de fitness aeròbic</b>.<br><br><b>Valors típics (homes):</b><br>• &lt;40: Principiant<br>• 40–45: Acceptable<br>• 45–50: Bo<br>• 50–55: Molt bo<br>• &gt;55: Excel·lent / elit amateur<br><br><b>Com es calcula aquí:</b><br>El VO₂max es calcula amb el mètode <b>VDOT de Daniels & Gilbert</b>, que és fiable només per a <b>esforços màxims</b> (curses o sèries dures de ≥3 km). Per això el VO₂max <b>actual</b> es pren com el millor d'aquests esforços vàlids recents, no la mitjana de tot.<br><br>Les activitats fàcils mostren una estimació orientativa (marcada amb <b>*</b>) que no s'usa per al valor oficial.<br><br>Es corregeix per <b>desnivell</b> (GAP), <b>calor i humitat</b> (temp+punt de rosada) i <b>altitud</b> (equivalent a nivell del mar)."},
  gap:{t:"GAP — Grade Adjusted Pace",d:"Ritme equivalent en terreny pla. Ajusta el teu pace real tenint en compte el <b>desnivell</b>.<br><br>Exemple: si corres a 6:00/km amb 5% de pendent, el teu GAP podria ser ~5:05/km — és a dir, l'esforç equivalent en pla.<br><br>Útil per comparar sessions amb desnivell diferent i per saber si realment vas més ràpid o era el terreny."},
  zones:{t:"Zones de Freqüència Cardíaca",d:"Rangs d'intensitat basats en la teva FC Màxima i FC Repòs (mètode Karvonen):<br><br>• <b>Z1 Recuperació</b> (&lt;60% FCR): Molt fàcil, recuperació activa<br>• <b>Z2 Aeròbic</b> (60-70% FCR): Base aeròbica, ritme conversacional. La zona més important per salut.<br>• <b>Z3 Tempo</b> (70-80% FCR): Còmodament dur, millora resistència<br>• <b>Z4 Llindar</b> (80-90% FCR): Dur, prop del llindar anaeròbic<br>• <b>Z5 VO₂max</b> (&gt;90% FCR): Molt dur, intervals curts<br><br><b>Model 80/20:</b> ~80% del volum en Z1-Z2, ~20% en Z3-Z5."},
  ff:{t:"Fitness & Freshness (Banister)",d:"Model matemàtic que prediu la teva <b>forma esportiva</b> combinant tres mètriques:<br><br>• <b>Fitness (CTL)</b>: Acumulació d'entrenament (~42 dies)<br>• <b>Fatiga (ATL)</b>: Cansament recent (~7 dies)<br>• <b>Forma (TSB)</b>: Fitness − Fatiga<br><br>Desenvolupat per Eric Banister el 1975 i adoptat per Strava, TrainingPeaks i Garmin. El gràfic mostra l'evolució de les tres corbes al llarg del temps."},
  efficiency:{t:"Eficiència Cardíaca",d:"Ràtio entre ritme (segons/km) i FC mitjana (bpm). Un valor <b>més baix</b> és millor: significa que corres més ràpid amb menys esforç cardíac.<br><br>Exemple: 3.5 s/bpm és més eficient que 4.0 s/bpm.<br><br>Si l'eficiència millora al llarg del temps amb el mateix ritme, indica <b>adaptació aeròbica</b> (el cor bombeja més sang per batec)."},
  intensity:{t:"Intensitat — % FC Màxima",d:"Percentatge de la teva freqüència cardíaca mitjana respecte a la FC màxima configurada.<br><br>• &lt;65%: Molt fàcil (recuperació)<br>• 65–75%: Fàcil (Z2 aeròbic)<br>• 75–82%: Moderat (tempo)<br>• 82–90%: Dur (llindar)<br>• &gt;90%: Molt dur (VO₂max)<br><br>Per mantenir forma i salut, la majoria de sessions haurien de ser al 65-75%."},
  monotony:{t:"Monotonia d'Entrenament",d:"Mesura quant de <b>semblants</b> són les teves sessions dia a dia. Es calcula com la mitjana diària de TRIMP dividida per la desviació estàndard.<br><br>• &lt;1.5: Bona variabilitat ✓<br>• 1.5–2.0: Precaució<br>• &gt;2.0: Monotonia alta — risc de sobreentrenament<br><br>Solució: alterna sessions llargues/curtes i fàcils/dures."},
  re:{t:"Esforç Relatiu Setmanal",d:"Suma del TRIMP de totes les sessions d'una setmana. La <b>banda</b> (±20% de la mitjana de 3 setmanes) indica si estàs entrenant dins la normalitat.<br><br>• Dins la banda: Consistent ✓<br>• Per sobre: Setmana dura, cal recuperar<br>• Per sota: Setmana fàcil (pot ser descàrrega planificada)"},
  pr:{t:"Personal Records (Millors Marques)",d:"Les millors marques estimades per a cada distància de referència (1K, 5K, 10K, Mitja, Marató), calculades a partir del ritme i temps de les teves activitats.<br><br>Es busca la millor combinació pace×distància per a cada distància estàndard."},
  riegel:{t:"Predicció de Cursa (Riegel)",d:"Fórmula de Pete Riegel (1977) per predir temps de cursa a altres distàncies basant-se en un resultat conegut:<br><br><b>T₂ = T₁ × (D₂/D₁)^1.06</b><br><br>Exemple: si fas 5K en 25:00, prediu ~52:30 per 10K.<br><br>L'exponent 1.06 reflecteix que no pots mantenir el mateix ritme a distàncies més llargues."},
  streak:{t:"Ratxa (Running Streak)",d:"Nombre de <b>dies consecutius</b> amb almenys una activitat registrada.<br><br>Les ratxes motiven la consistència, però recorda: el descans és part de l'entrenament. No sacrifiquis la recuperació per mantenir una ratxa."},
  badges:{t:"Badges (Assoliments)",d:"Fites d'entrenament que es desbloquegen automàticament al complir certs objectius: distàncies acumulades, ratxes, desnivell, velocitat, volum...<br><br>Inspirats en Smashrun i Strava, serveixen com a motivació extra per mantenir la consistència."},
  status:{t:"Training Status (Estat d'Entrenament)",d:"Classificació automàtica de l'estat actual basada en tendències de Fitness i Fatiga:<br><br>• 🟢 <b>Productiu</b>: CTL pujant, estàs millorant<br>• 🔵 <b>Manteniment</b>: Fitness estable<br>• 🟡 <b>Recuperació</b>: Càrrega reduïda, el cos descansa<br>• ⭐ <b>Peaking</b>: Fitness alt + fatiga baixa = forma màxima<br>• 🔴 <b>Sobrecarregat</b>: TSB molt negatiu, cal descansar<br>• 📉 <b>Desentrenament</b>: Sense activitat recent<br><br>Inspirat en Garmin Training Status (Firstbeat Analytics)."},
  easytr:{t:"Easy TRIMP Recomanat",d:"TRIMP màxim suggerit per a la sessió de demà que mantindria el TSB (Training Stress Balance) a zero — és a dir, sense acumular més fatiga.<br><br>Si estàs fatigat (TSB negatiu), et recomana dies de descans en lloc d'un valor TRIMP."},
  heatmap:{t:"Calendari Heatmap",d:"Visualització dels últims 6 mesos on cada quadrat representa un dia. La <b>intensitat del color</b> indica els quilòmetres recorreguts aquell dia.<br><br>Permet veure patrons de consistència, setmanes de càrrega/descàrrega, i períodes d'inactivitat d'un cop d'ull."},
  drift:{t:"Deriva Cardíaca (Decoupling)",d:"Mesura quant puja la FC durant una sessió a esforç constant. Compara la relació velocitat/FC de la 1a meitat vs la 2a.<br><br><b>Decoupling (%):</b><br>• &lt;5%: Excel·lent resistència aeròbica ✓<br>• 5–10%: Acceptable, normal en tirades llargues<br>• &gt;10%: Alta — fatiga, deshidratació, calor o ritme massa ràpid<br><br>Un dels millors indicadors de condició aeròbica i adaptació a fons."},
  mmp:{t:"Corba de Millors Esforços (Mean Maximal Pace)",d:"Mostra el millor ritme sostingut per a cada durada dins l'activitat (1, 2, 5, 10, 20, 30, 60 min).<br><br>És l'equivalent running de la 'power curve' del ciclisme. Permet veure el teu perfil (velocista vs fondista), si millores en esforços curts o llargs, i planificar entrenaments.<br><br>Es calcula amb finestra lliscant sobre la velocitat segon a segon."},
  monotony:{t:"Monotonia i Strain",d:"<b>Monotonia</b>: com de semblants són les sessions dia a dia (mitjana TRIMP / desviació estàndard).<br>• &lt;1.5: Bona variabilitat ✓<br>• 1.5–2.0: Precaució<br>• &gt;2.0: Risc de sobreentrenament<br><br><b>Strain</b>: càrrega setmanal × monotonia. Un strain alt amb monotonia alta és el combinat de més risc de lesió segons Foster (1998)."},
  racepred:{t:"Predictor de Cursa Avançat",d:"Combina dos models de predicció i ajusta pel desnivell:<br><br>• <b>Riegel:</b> T₂ = T₁ × (D₂/D₁)^1.06<br>• <b>VDOT (Daniels):</b> model amb factor de fatiga 1.07<br><br>La <b>mitjana</b> dels dos dona una estimació en pla. Després s\x27afegeix una penalització de ~0.6s per metre de desnivell positiu (estimació conservadora per trail).<br><br>Útil per planificar curses de muntanya on el ritme pla no serveix."}
};

const fP=s=>{if(!s||s<=0)return"--:--";return Math.floor(s/60)+":"+String(Math.round(s%60)).padStart(2,"0")};
const fD=s=>{if(!s)return"--:--";const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),c=Math.round(s%60);return h>0?h+"h "+m+"m":m+":"+String(c).padStart(2,"0")};
const fDH=s=>{if(!s)return"--:--:--";const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),c=Math.round(s%60);return h+":"+String(m).padStart(2,"0")+":"+String(c).padStart(2,"0")};
const fDL=s=>{if(!s)return"--";const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);return h>0?h+"h"+m+"m":m+"min"};
const pP=s=>{if(!s)return null;const c=String(s).replace(",",".").trim(),m=c.match(/^(\d+):(\d{2})$/);if(m)return+m[1]*60+ +m[2];const n=parseFloat(c);return isNaN(n)?null:n*60};
const pD=s=>{if(!s)return null;const t=String(s).trim(),h=t.match(/^(\d+):(\d{2}):(\d{2})$/);if(h)return+h[1]*3600+ +h[2]*60+ +h[3];const m=t.match(/^(\d+):(\d{2})$/);if(m)return+m[1]*60+ +m[2];const n=parseFloat(t);return isNaN(n)?null:n};
const karv=(mx,r)=>[Math.round(r+(mx-r)*.6),Math.round(r+(mx-r)*.7),Math.round(r+(mx-r)*.8),Math.round(r+(mx-r)*.9)];

// ═══ VDOT (Daniels & Gilbert) — duration-based, for MAXIMAL efforts ═══
// This is the validated method: uses race distance + time, no HR needed.
// vdotFromEffort(distanceKm, durationSec) → pseudo-VO2max
function vdotFromEffort(distKm,durSec){
  if(!distKm||!durSec||distKm<=0||durSec<=0)return null;
  const meters=distKm*1000;
  const tMin=durSec/60;
  const v=meters/tMin;                       // velocity m/min
  const vo2=-4.6+0.182258*v+0.000104*v*v;    // O2 cost of the velocity
  const pct=0.8+0.1894393*Math.exp(-0.012778*tMin)+0.2989558*Math.exp(-0.1932605*tMin); // fraction of VO2max sustainable for tMin
  if(pct<=0)return null;
  return Math.round(vo2/pct*10)/10;
}

// Is this activity a valid maximal-ish effort for VDOT estimation?
// Requires distance in the Daniels-valid range (>=3km) and high intensity (HR near max OR a known race/workout).
function isValidVO2Effort(a){
  if(!a.distance||a.distance<3)return false;            // too short / unreliable
  if(a.distance>50)return false;                         // beyond Daniels range
  const intenseByHR=a.avgHR&&settings.hrMax&&(a.avgHR/settings.hrMax)>=0.85; // ~threshold+ effort
  const intenseByZone=a.hrZone!==null&&a.hrZone>=3;      // Z4/Z5: tempos durs de 20 min ja entren per aquí
  // NOTA: Z3 submàxim NO és vàlid per a VDOT (el model assumeix esforç màxim per a la durada).
  // L'estimació sense cursa la cobreix vdotFromCurve() amb els millors esforços reals.
  return !!(intenseByHR||intenseByZone);
}

function calcFF(){

function calcACWR(){

// ═══ F6: MONOTONIA + STRAIN ═══
function calcMonotony(){
  const r28=acts.filter(a=>dS(a.date)<=28);
  if(r28.length<5)return null;
  const daily={};
  for(let i=0;i<28;i++){const d=new Date();d.setDate(d.getDate()-i);daily[dateStr(d)]=0}
  r28.forEach(a=>{daily[a.date]=(daily[a.date]||0)+(a.trimp||(a.distance||0)*5)});
  const loads=Object.values(daily);
  const mean=loads.reduce((s,v)=>s+v,0)/loads.length;
  const std=Math.sqrt(loads.reduce((s,v)=>s+(v-mean)**2,0)/loads.length);
  const monotony=std>0?Math.round(mean/std*100)/100:0;
  const weeklyLoad=loads.slice(0,7).reduce((s,v)=>s+v,0);
  const strain=Math.round(weeklyLoad*monotony);

// ═══ F1: DERIVA CARDÍACA ═══
function calcCardiacDrift(streams){
  if(!streams||!streams.heartrate||!streams.velocity_smooth)return null;
  const hr=streams.heartrate.data,vel=streams.velocity_smooth.data;
  if(!hr||!vel||hr.length<60)return null;
  const half=Math.floor(hr.length/2);
  // First half
  let hr1=0,v1=0,n1=0;
  for(let i=0;i<half;i++){if(hr[i]>0&&vel[i]>0.5){hr1+=hr[i];v1+=vel[i];n1++}}
  // Second half
  let hr2=0,v2=0,n2=0;
  for(let i=half;i<hr.length;i++){if(hr[i]>0&&vel[i]>0.5){hr2+=hr[i];v2+=vel[i];n2++}}
  if(n1<10||n2<10)return null;
  const avgHr1=hr1/n1,avgHr2=hr2/n2,avgV1=v1/n1,avgV2=v2/n2;
  // Pa:Hr ratio (pace per HR) - decoupling
  const ratio1=avgV1/avgHr1,ratio2=avgV2/avgHr2;
  const decoupling=Math.round((ratio1-ratio2)/ratio1*1000)/10;
  return{
    drift:Math.round((avgHr2-avgHr1)*10)/10,
    decoupling:decoupling,
    hr1:Math.round(avgHr1),hr2:Math.round(avgHr2),
    v1:Math.round(avgV1*100)/100,v2:Math.round(avgV2*100)/100
  };
}

// ═══ AGE / THRESHOLD / ZONE ENGINE ═══

// Auto-detect HRmax from history: robust high percentile of per-activity max HR in hard efforts.
function detectHRmax(){
  // Use activities that have a recorded maxHR; filter plausible (120-220) and intense.
  const hard=acts.filter(a=>dS(a.date)<=730&&a.maxHR&&a.maxHR>=120&&a.maxHR<=220&&((a.avgHR&&settings.hrMax&&a.avgHR/220>=0.6)||a.hrZone>=2||(a.distance||0)>=3));
  const peaks=hard.map(a=>a.maxHR).sort((x,y)=>y-x);
  if(peaks.length<3)return null;
  // robust: take 95th-percentile-ish (2nd or 3rd highest) to avoid a single sensor artifact
  const idx=Math.min(peaks.length-1,1); // second highest as robust max
  const detected=peaks[idx];
  // find the activity for context
  const src=hard.filter(a=>a.maxHR===detected).sort((a,b)=>b.date.localeCompare(a.date))[0];
  return{value:detected,topThree:peaks.slice(0,3),act:src?{date:src.date,title:src.title,maxHR:src.maxHR}:null,n:peaks.length};
}

// LT1 method 2: conservative estimate from literature (65% HRR or 70% HRmax — take HRR-based).
function lt1Conservative(){
  const mx=settings.hrMax,rest=settings.hrRest;
  if(!mx||!rest)return null;
  return Math.round(rest+0.65*(mx-rest)); // 65% heart-rate reserve
}

// LT1 method 1: cardiac decoupling on long steady runs.
// Uses cached streams (already fetched for advanced analysis). Returns the highest HR
// at which decoupling stays low (<5%) across long runs, i.e. the aerobic ceiling.
function lt1Decoupling(){
  // gather long runs (>=45min) with cached streams
  const longRuns=acts.filter(a=>dS(a.date)<=730&&a.source==="strava"&&(a.duration||0)>=2700&&streamCache[a.id.replace("strava-","")]);
  const below=[];const above=[];
  longRuns.forEach(a=>{
    const s=streamCache[a.id.replace("strava-","")];
    const d=calcCardiacDrift(s);
    if(!d)return;
    if(d.decoupling<5)below.push(d.hr2||d.hr1); // stable → ran below LT1, HR is a floor
    else above.push(d.hr1); // drifted → ran above LT1, HR is a ceiling marker
  });

  // LT1 estimate ≈ highest HR among stable (below) runs
  const est=Math.max(...below);
  return{value:Math.round(est),nStable:below.length,nDrift:above.length,
    // confidence: high if we have both stable and drift runs bracketing
    conf:(below.length>=3&&above.length>=1)?"alta":(below.length>=2)?"mitjana":"baixa"};

// LT2 from settings (set via field test) or estimate from best sustained ~20-40min hard effort
function lt2Estimate(){

function minettiCost(grade){

}
function calcSegmentedGAP(streams,act){
  if(!streams||!streams.grade_smooth||!streams.velocity_smooth||!streams.distance)return null;
  const grade=streams.grade_smooth.data,vel=streams.velocity_smooth.data,dist=streams.distance.data;
  if(!grade||!vel||grade.length<30)return null;
  const flatCost=minettiCost(0);
  // Compute the GAP RATIO from streams (equivalent flat distance / real distance).
  // A ratio of distances is robust to the sampling rate (dt cancels out).
  let totalEquivDist=0,realDist=0;
  for(let i=1;i<vel.length;i++){
    if(vel[i]>0.5){
      const dd=vel[i]; // distance increment proportional; dt cancels in the ratio
      realDist+=dd;
      const cost=minettiCost(grade[i]||0);
      totalEquivDist+=dd*(cost/flatCost);
    }
  }
  if(realDist<100)return null;
  const ratio=totalEquivDist/realDist; // >1 means terrain made it harder
  // ANCHOR to the activity's true real pace (distance/total time) so it matches the detail screen.
  let realPace;
  if(act&&act.pace){realPace=act.pace}
  else if(act&&act.duration&&act.distance){realPace=act.duration/act.distance}
  else{realPace=null}
  if(realPace===null)return null;
  const gapPace=realPace/ratio;
  return{realPace:Math.round(realPace),gapPace:Math.round(gapPace),diff:Math.round(realPace-gapPace)};
}

// ═══ F3: CORBA DE MILLORS ESFORÇOS (Mean Maximal Pace) ═══
function calcMMP(streams){
  if(!streams||!streams.velocity_smooth||!streams.time)return null;
  const vel=streams.velocity_smooth.data,time=streams.time.data;
  if(!vel||vel.length<60)return null;
  const durations=[60,120,300,600,1200,1800,3600];
  const labels=["1min","2min","5min","10min","20min","30min","60min"];
  const result=[];
  durations.forEach((dur,di)=>{
    if(vel.length<dur)return;
    let bestAvg=0;
    // Sliding window
    let sum=0;
    for(let i=0;i<dur;i++)sum+=vel[i]||0;
    bestAvg=sum/dur;
    for(let i=dur;i<vel.length;i++){
      sum+=( vel[i]||0)-(vel[i-dur]||0);
      const avg=sum/dur;
      if(avg>bestAvg)bestAvg=avg;
    }
    if(bestAvg>0.5){
      const pace=1000/bestAvg; // sec/km
      result.push({dur,label:labels[di],pace:Math.round(pace),speed:Math.round(bestAvg*100)/100});
    }
  });
  return result.length?result:null;
}

// ═══ F4: PREDICTOR MULTI-MODEL ═══
function vdotPredict(t1,d1,d2){
  // Daniels VDOT approximation via velocity at vVO2max
  const v1=d1/t1; // m/s

  return t1*Math.pow(d2/d1,1.07);

  return{
    riegel:Math.round(riegel),
    vdot:Math.round(vdot),
    avg:Math.round(avg),
    withElev:Math.round(avg+elevPenalty),

  };
}

// Stats for an arbitrary day window [fromDaysAgo, toDaysAgo)
function getWindowStats(fromAgo,toAgo){
  const r=acts.filter(a=>{const d=dS(a.date);return d>=fromAgo&&d<toAgo});
  const pc=r.filter(a=>a.pace);
  return{km:r.reduce((s,a)=>s+(a.distance||0),0),dur:r.reduce((s,a)=>s+(a.duration||0),0),asc:r.reduce((s,a)=>s+(a.ascent||0),0),n:r.length,
    pace:pc.length?pc.reduce((s,a)=>s+a.pace,0)/pc.length:null,
    hr:r.filter(a=>a.avgHR).length?Math.round(r.filter(a=>a.avgHR).reduce((s,a)=>s+a.avgHR,0)/r.filter(a=>a.avgHR).length):null};
}
// % change current 28d vs previous 28d (higherBetter controls arrow color meaning)
function pctChange(cur,prev){if(prev===null||prev===0||cur===null)return null;return Math.round((cur-prev)/prev*1000)/10}

// HR zone distribution over a window (by time in zone, approximated by duration per activity's avg zone)
function getZoneDist(daysAgo){
  const r=acts.filter(a=>dS(a.date)<=daysAgo&&a.hrZone!==null&&a.duration);
  const z=[0,0,0,0,0];let tot=0,tizDur=0,allDur=0;
  r.forEach(a=>{
    if(a.tiz){a.tiz.forEach((m,i)=>{z[i]+=m*60});tizDur+=a.duration}
    else z[a.hrZone]+=a.duration;
    tot+=a.duration;allDur+=a.duration;
  });
  if(tot===0)return null;
  const sum=z.reduce((s,v)=>s+v,0)||1;
  return{pct:z.map(v=>Math.round(v/sum*100)),tot:tot,coverage:allDur?Math.round(tizDur/allDur*100):0};
}

// Period records
function getPeriodRecords(daysAgo){
  const r=acts.filter(a=>dS(a.date)<=daysAgo);
  if(!r.length)return null;
  let longest=null,fastest=null,mostAsc=null;
  r.forEach(a=>{
    if(a.distance&&(!longest||a.distance>longest.distance))longest=a;
    if(a.pace&&(a.distance||0)>=3&&(!fastest||a.pace<fastest.pace))fastest=a;
    if(a.ascent&&(!mostAsc||a.ascent>mostAsc.ascent))mostAsc=a;
  });
  // best volume week
  const wk={};r.forEach(a=>{const w=wK(a.date);wk[w]=(wk[w]||0)+(a.distance||0)});
  let bestWeek=null;Object.entries(wk).forEach(([w,km])=>{if(!bestWeek||km>bestWeek.km)bestWeek={w:w,km:km}});
  return{longest,fastest,mostAsc,bestWeek};
}

// Project TSB/CTL forward N days assuming avg recent daily load continues
function projectFitness(ff,days,dailyLoad){
  if(!ff.length)return[];
  let ctl=ff[ff.length-1].ctl,atl=ff[ff.length-1].atl;
  const out=[];
  for(let i=1;i<=days;i++){ctl=ctl*(1-1/42)+dailyLoad/42;atl=atl*(1-1/7)+dailyLoad/7;out.push({day:i,ctl:Math.round(ctl*10)/10,atl:Math.round(atl*10)/10,tsb:Math.round((ctl-atl)*10)/10})}
  return out;
}
// Estimated recovery hours from last session based on its TRIMP and current ATL
function estRecovery(){
  const recent=acts.filter(a=>dS(a.date)<=3).sort((a,b)=>(b.startTime||b.date+"T12:00").localeCompare(a.startTime||a.date+"T12:00"));
  if(!recent.length)return null;
  const last=recent[0];const tr=last.trimp||(last.distance||0)*5;
  const total=Math.min(72,Math.round(tr*0.5)); // hores teòriques de recuperació
  // moment de l'última sessió: hora real si la tenim, si no migdia (aproximació honesta)
  const startMs=last.startTime?new Date(last.startTime).getTime():new Date(last.date+"T12:00:00").getTime();
  const elapsed=Math.max(0,(Date.now()-startMs)/3600000);
  const remaining=Math.max(0,Math.round(total-elapsed));
  return{total,elapsed:Math.round(elapsed),remaining,approx:!last.startTime};
}

// Temperature data coverage diagnostic
function tempDiagnostic(){
  const strava=acts.filter(a=>a.source==="strava");
  const withGps=strava.filter(a=>a.lat&&a.startTime);
  const withWx=strava.filter(a=>{const w=actWx(a);return w&&w.t!=null});
  const temps=withWx.map(a=>actWx(a).t);
  return{
    total:strava.length,
    withGps:withGps.length,
    withTemp:withWx.length,
    pct:strava.length?Math.round(withWx.length/strava.length*100):0,
    min:temps.length?Math.min(...temps):null,
    max:temps.length?Math.max(...temps):null,
    avg:temps.length?Math.round(temps.reduce((s,v)=>s+v,0)/temps.length):null
  };
}

async function fetchActTemp(a){
  // Device temperature is NOT trusted (Garmin wrist sensor is unreliable) — always use Open-Meteo
  if(tempCache[a.id]!==undefined)return tempCache[a.id];
  if(!a.lat||!a.lng||!a.startTime)return null;
  const dt=new Date(a.startTime);
  const date=dt.toISOString().slice(0,10);
  const hour=dt.getHours();
  const url="https://archive-api.open-meteo.com/v1/archive?latitude="+a.lat.toFixed(3)+"&longitude="+a.lng.toFixed(3)+"&start_date="+date+"&end_date="+date+"&hourly=temperature_2m,dew_point_2m,wind_speed_10m&timezone=auto&elevation=nan";
  const elUrl="https://api.open-meteo.com/v1/elevation?latitude="+a.lat.toFixed(4)+"&longitude="+a.lng.toFixed(4);
  try{
    const resp=await fetch(url);
    if(!resp.ok)throw new Error("HTTP "+resp.status);
    const data=await resp.json();
    const tArr=data&&data.hourly&&data.hourly.temperature_2m;
    const dArr=data&&data.hourly&&data.hourly.dew_point_2m;
    if(!tArr||!tArr.length)throw new Error("sense dades");
    const idx=Math.min(hour,tArr.length-1);
    const t=Math.round(tArr[idx]);
    const dp=(dArr&&dArr.length)?Math.round(dArr[idx]):null;
    let elev=null;
    try{const er=await fetch(elUrl);if(er.ok){const ed=await er.json();if(ed&&ed.elevation&&ed.elevation.length)elev=Math.round(ed.elevation[0])}}catch(e){}
    const wArr=data&&data.hourly&&data.hourly.wind_speed_10m;
    const wsp=(wArr&&wArr.length)?Math.round(wArr[idx]):null;
    const rec={t:t,dp:dp,elev:elev,w:wsp};
    tempCache[a.id]=rec;saveTempCache();
    return rec;
  }catch(err){return null}
}
// Returns {t,dp,elev} object. Manual entry only overrides temperature.
function actWx(a){
  if(typeof a.tempManual==="number")return {t:a.tempManual,dp:null,elev:(a.altManual!=null?a.altManual:null)};
  const c=tempCache[a.id];
  if(c!==undefined&&c!==null){
    if(typeof c==="number")return {t:c,dp:null,elev:null}; // legacy cache (plain number)
    return c; // {t,dp,elev}
  }
  if(typeof a.tempManual==="number")return {t:a.tempManual,dp:null,elev:null};
  return null;
}
// Backward-compatible: returns just the temperature number (or null)
function actTemp(a){const w=actWx(a);return w?w.t:null}
function setManualTemp(id,val){
  const a=acts.find(x=>x.id===id);if(!a)return;
  const v=parseFloat(val);a.tempManual=isNaN(v)?null:v;
  recomputeVO2(a);saveActs();render();
}
// Heat pace adjustment: Temp + Dew Point (°F) sum → % faster equivalent pace.
// Based on Coach Mark Hadley / Maximum Performance Running model (validated by
// Running Writings statistical model on 3891 marathoners / 754 races).
function heatPaceAdjPct(tempC,dewC){
  if(typeof tempC!=="number")return 0;
  const tF=tempC*9/5+32;
  const dF=(typeof dewC==="number")?dewC*9/5+32:tF-8; // estimate dew point if missing
  const s=tF+dF;
  if(s<=100)return 0;
  if(s<=110)return 0.25; if(s<=120)return 0.75; if(s<=130)return 1.5;
  if(s<=140)return 2.5;  if(s<=150)return 3.75; if(s<=160)return 5.25;
  if(s<=170)return 7.0;  if(s<=180)return 9.0;  return 11.0;
}
// Apply environmental corrections to a pace (faster cool/flat-equivalent pace).
function correctedPace(pace,ascent,distance,wx){
  let p=pace;
  if(ascent&&distance&&distance>0){const grad=(ascent/(distance*1000))*100;const f=1+0.033*grad;if(f>0)p=pace/f}
  const tC=wx&&typeof wx.t==="number"?wx.t:null;
  const dC=wx&&typeof wx.dp==="number"?wx.dp:null;
  const adj=heatPaceAdjPct(tC,dC);
  if(adj>0)p=p*(1-adj/100);
  return p;
}
// Apply altitude (hypoxia) correction to a VO2 value → sea-level equivalent.
function altitudeCorrect(vo2,wx){
  if(vo2===null)return null;
  const elev=wx&&typeof wx.elev==="number"?wx.elev:null;
  if(elev!==null&&elev>600){const lossPct=6.3*(elev-600)/1000;return vo2/(1-lossPct/100)}
  return vo2;
}
// Corrected VO2max for an activity.
// For VALID maximal efforts → uses Daniels/Gilbert VDOT (duration-based, the accurate method).
// Otherwise → falls back to the HR-based estimate, flagged as low confidence.
function estVO2corr(pace,hr,mx,ascent,distance,wx){
  const cp=correctedPace(pace,ascent,distance,wx);
  let vo2=estVO2(cp,hr,mx);
  return altitudeCorrect(vo2,wx)!==null?Math.round(altitudeCorrect(vo2,wx)*10)/10:null;
}
function recomputeVO2(a){
  const wx=actWx(a);
  if(isValidVO2Effort(a)&&a.distance&&a.duration){
    // Cru i corregit amb el MATEIX mètode (VDOT): el delta mostrat és només ambiental
    const rawV=vdotFromEffort(a.distance,a.duration);
    const cp=correctedPace(a.pace,a.ascent,a.distance,wx);
    let v=vdotFromEffort(a.distance,cp*a.distance);
    v=altitudeCorrect(v,wx);
    a.vo2raw=rawV!==null?Math.round(rawV*10)/10:null;
    a.vo2=v!==null?Math.round(v*10)/10:null;
    a.vo2conf="high";
  }else{
    const rawE=(a.pace&&a.avgHR)?estVO2(a.pace,a.avgHR,settings.hrMax):null;
    a.vo2raw=rawE!==null&&rawE!==undefined?Math.round(rawE*10)/10:null;
    a.vo2=estVO2corr(a.pace,a.avgHR,settings.hrMax,a.ascent,a.distance,wx);
    a.vo2conf="low";
  }
}
// Current "official" VO2max = best valid effort in the last N days.
function currentVO2max(days){
  const win=acts.filter(a=>dS(a.date)<=(days||42)&&a.vo2conf==="high"&&a.vo2);
  if(!win.length){
    // fallback: best low-confidence estimate
    const any=acts.filter(a=>dS(a.date)<=(days||42)&&a.vo2);
    if(!any.length)return null;
    return{value:Math.max(...any.map(a=>a.vo2)),conf:"low",n:any.length};
  }
  return{value:Math.max(...win.map(a=>a.vo2)),conf:"high",n:win.length};
}
let enriching=false;
async function enrichTemps(){
  if(enriching)return;enriching=true;
  const btn=document.getElementById("enrichBtn");
  const targets=acts.filter(a=>a.source==="strava"&&actTemp(a)===null&&a.lat&&a.startTime);
  let done=0,found=0;
  for(const a of targets){
    if(btn)btn.textContent="Consultant... "+(++done)+"/"+targets.length;
    const t=await fetchActTemp(a);
    if(t!==null)found++;
    await new Promise(r=>setTimeout(r,120));
  }
  if(settings.aiModel==="claude-haiku-4-5-20251001")settings.aiModel="claude-sonnet-4-6";
acts.forEach(recomputeVO2);
  saveActs();enriching=false;render();
  setTimeout(()=>{const b=document.getElementById("enrichBtn");if(b)b.textContent="✓ "+found+" temperatures obtingudes ("+targets.length+" provades)";},50);
}

function pickWorkout(type,seed,pref){
  const arr=WORKOUTS[type]||WORKOUTS.easy;
  if(pref!=null&&arr[pref])return arr[pref];
  const i=((seed||0)%arr.length+arr.length)%arr.length;
  return arr[i];
}

// Analyze last ~2 years to infer habitual training days and session durations
function analyzeHistory(){
  const r=acts.filter(a=>dS(a.date)<=730&&a.distance);
  if(r.length<8)return null;
  // weeks count for averaging
  const weeks={};r.forEach(a=>{weeks[wK(a.date)]=true});
  const nWeeks=Math.max(1,Object.keys(weeks).length);
  // day-of-week frequency
  const dayFreq={dl:0,dt:0,dc:0,dj:0,dv:0,ds:0,dg:0};
  r.forEach(a=>{const d=DOW[new Date(a.date).getDay()];dayFreq[d]++});
  // sessions per week (avg distinct active days/week)
  const perWeekDays={};r.forEach(a=>{const w=wK(a.date);(perWeekDays[w]=perWeekDays[w]||new Set()).add(DOW[new Date(a.date).getDay()])});
  const avgDays=Math.round(Object.values(perWeekDays).reduce((s,set)=>s+set.size,0)/nWeeks);
  // weekly volume
  const wV={};r.forEach(a=>{wV[wK(a.date)]=(wV[wK(a.date)]||0)+(a.distance||0)});
  const vols=Object.values(wV);const avgVol=vols.reduce((s,v)=>s+v,0)/vols.length;
  // typical durations
  const durs=r.filter(a=>a.duration).map(a=>a.duration).sort((x,y)=>x-y);
  const dists=r.filter(a=>a.distance).map(a=>a.distance).sort((x,y)=>x-y);
  const pctl=(arr,p)=>arr.length?arr[Math.min(arr.length-1,Math.floor(arr.length*p))]:0;
  const longKm=Math.round(pctl(dists,0.9));    // long run ~ 90th percentile distance
  const easyKm=Math.round(pctl(dists,0.45));   // typical easy run ~ median-ish
  const longDur=Math.round(pctl(durs,0.9));
  const easyDur=Math.round(pctl(durs,0.45));
  // pick the avgDays most frequent weekdays, keep weekly order
  const rankedDays=Object.entries(dayFreq).sort((a,b)=>b[1]-a[1]).slice(0,Math.max(3,Math.min(6,avgDays))).map(e=>e[0]);
  const chosenDays=DOW_ORDER.filter(d=>rankedDays.includes(d));
  return{nWeeks,avgDays:Math.max(3,Math.min(6,avgDays)),avgVol:Math.round(avgVol),longKm,easyKm,longDur,easyDur,chosenDays,dayFreq,total:r.length};
}

// Build a structured weekly plan from history + current fitness state (rule engine)
// ═══ PEÇA 1: BUCLE PLANIFICAT vs REALITZAT ═══
// Compare last week's saved plan with what was actually done.
function comparePlanVsActual(){
  const plan=loadPlan();
  if(!plan||!plan.sessions)return null;
  // last completed week (7-14 days ago window = "last week")
  const realLast=acts.filter(a=>{const d=dS(a.date);return d>=0&&d<=7});
  const plannedRun=plan.sessions.filter(s=>s.type!=="rest");
  const plannedKm=plannedRun.reduce((s,x)=>s+(x.km||0),0);
  const actualKm=realLast.reduce((s,a)=>s+(a.distance||0),0);
  const actualSessions=realLast.length;
  // intensity check: planned quality days vs actual hard sessions
  const plannedHard=plannedRun.filter(s=>s.type==="quality"||s.type==="tempo").length;
  const actualHard=realLast.filter(a=>a.hrZone>=3).length;
  // PATTERN DETECTION (coach's eye): easy too hard / hard too easy
  const easyRuns=realLast.filter(a=>{const s=plannedRun.find(p=>p.type==="easy");return a.hrZone!==null});
  // "easy too hard": runs meant easy but done in Z3+
  const tz=thresholdZones();
  let easyTooHard=0,hardTooEasy=0,easyCount=0,hardCount=0;
  realLast.forEach(a=>{
    if(a.hrZone===null)return;
    // infer intended: long/easy distance at Z3+ = too hard
    const isLongOrEasy=(a.distance||0)>=plannedKm*0.25||a.hrZone<=1;
    if(a.hrZone>=2&&(a.duration||0)>=2400){easyCount++;if(a.hrZone>=3)easyTooHard++}
    if(a.hrZone>=3){hardCount++}
  });
  const completion=plannedKm>0?Math.round(actualKm/plannedKm*100):0;
  return{
    plannedKm:Math.round(plannedKm),actualKm:Math.round(actualKm),
    completion,plannedSessions:plannedRun.length,actualSessions,
    plannedHard,actualHard,
    easyTooHard,easyCount,
    skipped:Math.max(0,plannedRun.length-actualSessions),
    overReached:actualKm>plannedKm*1.15,
    underDid:actualKm<plannedKm*0.7
  };
}

// ═══ PEÇA 4: CAPACITATS — eficiència aeròbica + llindar ═══
// Aerobic efficiency = pace per beat at easy (Z2) intensity, corrected, tracked over weeks.
// Higher = better (more speed per heartbeat).
function aerobicEfficiency(daysAgo,windowDays){
  const to=daysAgo||0, from=(daysAgo||0)+(windowDays||28);
  // easy runs: Z1-Z2, with HR and pace, corrected pace
  const easy=acts.filter(a=>{const d=dS(a.date);if(!(d>=to&&d<from&&a.avgHR&&a.pace&&a.hrZone!==null&&a.hrZone<=1&&(a.duration||0)>=1500))return false;
    if((a.ascent||0)/(a.distance||1)>=18)return false; // trail tècnic fora: no comparable (2.10)
    const wx0=actWx(a);if(wx0&&typeof wx0.w==="number"&&wx0.w>30)return false; // vent fort fora
    return true});
  if(easy.length<2)return null;
  // efficiency index: speed(m/min) per HR beat, using corrected pace; also track pace & HR separately
  let tot=0,n=0,totPace=0,totHR=0;
  easy.forEach(a=>{
    const cp=correctedPace(a.pace,a.ascent,a.distance,actWx(a)); // s/km corrected
    const speed=1000/cp*60; // m/min
    tot+=speed/a.avgHR;n++;
    totPace+=cp;totHR+=a.avgHR;
  });
  if(!n)return null;
  return{index:Math.round(tot/n*1000)/1000,n:n,avgPace:Math.round(totPace/n),avgHR:Math.round(totHR/n)};
}
// Trend of aerobic efficiency: compare recent window vs previous window
function efficiencyTrend(){
  const recent=aerobicEfficiency(0,28);
  const prev=aerobicEfficiency(28,28);
  if(!recent)return null;
  if(!prev)return{recent:recent.index,prev:null,pct:null,n:recent.n};
  const pct=Math.round((recent.index-prev.index)/prev.index*1000)/10;
  return{recent:recent.index,prev:prev.index,pct:pct,n:recent.n};
}
// Time series of aerobic efficiency in N rolling windows (for the chart). Oldest→newest.
function efficiencySeries(windows,windowDays){
  const W=windows||8, WD=windowDays||28, step=Math.round(WD/2);
  const out=[];
  for(let i=W-1;i>=0;i--){
    const daysAgo=i*step;
    const e=aerobicEfficiency(daysAgo,WD);
    if(e)out.push({daysAgo,index:e.index,avgPace:e.avgPace,avgHR:e.avgHR,n:e.n});
  }
  return out;
}


function genWeekPlan(){
  const hist=analyzeHistory();
  const ff=calcFF();const last=ff.length?ff[ff.length-1]:null;
  const acwr=calcACWR();
  const tsb=last?last.tsb:0;
  // fallback if not enough history
  if(!hist)return{insufficient:true};
  // Baseline volume: use recent 4-week average (current fitness), not just the 2-year average.
  // Progression is measured from CURRENT load, consistent with the AI ceiling.
  const recentWeeks=getWeekly().slice(-4).map(w=>w.km).filter(k=>k>0);
  const recentAvg=recentWeeks.length?recentWeeks.reduce((s,k)=>s+k,0)/recentWeeks.length:0;
  const baseVol=Math.max(recentAvg,hist.avgVol);
  // target weekly volume: respect current load, modulate by fatigue
  let mult=1.0;let phase="manteniment";
  if(tsb<-15||((acwr||1)>1.4)){mult=0.75;phase="descàrrega"}
  else if(tsb>10&&(acwr||1)<1.1){mult=1.08;phase="construcció"}
  // P1: periodització inversa si hi ha cursa objectiu (la fatiga sempre pot reduir, mai augmentar)
  const rp=racePhase();let variantPrefs=null;
  if(rp&&!rp.past){
    if(rp.phase==="setmana de cursa"){mult=Math.min(mult,0.4);phase="setmana de cursa"}
    else if(rp.phase==="taper"){mult=Math.min(mult,rp.weeks<=1?0.6:0.75);phase="taper · "+rp.weeks+" setm"}
    else if(rp.phase==="pic"){mult=Math.min(mult,1.02);phase="pic · "+rp.weeks+" setm"}
    else if(rp.phase==="específic"){phase=(phase==="descàrrega"?"descàrrega (específic)":"específic · "+rp.weeks+" setm")}
    else if(phase==="manteniment")phase="base";
    if(rp.trail)variantPrefs={long:3,tempo:3}; // llarga trail + tempo en pujada
  }
  const targetVol=Math.round(baseVol*mult);
  // distribute sessions across chosen days
  const days=hist.chosenDays.slice();
  const nRun=days.length;
  // session pattern: 1 long, 1 quality (skip if descàrrega), rest easy; strength on 1-2 low days
  const longKm=Math.max(8,Math.round(targetVol*0.32));
  const remaining=targetVol-longKm;
  const hasQuality=phase!=="descàrrega"&&nRun>=4;
  const qualityKm=hasQuality?Math.round(targetVol*0.18):0;
  const easyDays=nRun-1-(hasQuality?1:0);
  const easyKm=easyDays>0?Math.max(4,Math.round((remaining-qualityKm)/easyDays)):0;
  // assign session types to days: put long on last chosen day (usually weekend), quality mid-week
  const sessions=[];
  const longDay=days[days.length-1];
  const qualityDay=hasQuality?days[Math.min(1,days.length-1)]:null;
  days.forEach(d=>{
    if(d===longDay)sessions.push({day:d,type:"long",km:longKm});
    else if(d===qualityDay)sessions.push({day:d,type:"quality",km:qualityKm});
    else sessions.push({day:d,type:"easy",km:easyKm});
  });
  // strength/core on up to 2 non-running or easy days
  const restDays=DOW_ORDER.filter(d=>!days.includes(d));
  const strengthDays=[];
  if(restDays.length){strengthDays.push(restDays[0])}
  if(restDays.length>1)strengthDays.push(restDays[Math.floor(restDays.length/2)]);
  else{const easyOnly=sessions.filter(s=>s.type==="easy").map(s=>s.day);if(easyOnly.length)strengthDays.push(easyOnly[0])}
  const variantSeed=parseInt(wK(dateStr(new Date())).replace(/\D/g,"").slice(-3)||"0",10);
  return{hist,phase,targetVol,sessions,strengthDays,longDay,qualityDay,tsb,acwr,variantSeed,variantPrefs};
}

  // F3: MMP chart

      },80);
    }
  }
}

function setPeriod(d){progPeriod=d;render()}
function arrow(pct,higherBetter){
  if(pct===null)return "<span style='font-size:11px;color:var(--on-surface-var)'>—</span>";
  const up=pct>0;const good=higherBetter?up:!up;
  const col=Math.abs(pct)<1?"var(--on-surface-var)":(good?"var(--ok)":"var(--dn)");
  const ar=Math.abs(pct)<1?"":(up?"▲":"▼");
  return "<span style='font-size:11px;font-weight:700;color:"+col+"'>"+ar+" "+(pct>0?"+":"")+pct+"%</span>";
}

h+="</div>"; // tanca sub-pr

    h+="<div class='stat' style='background:var(--dnBg)'><div class='label help-tag' onclick='showHelp(\x22atl\x22)' style='display:inline-block'>Fatiga</div><div class='val' style='color:var(--dn)'>"+last.atl+"</div><div class='unit'>ATL</div></div>";

    h+="<div class='stat' style='background:"+tc+"1e'><div class='label help-tag' onclick='showHelp(\x22tsb\x22)' style='display:inline-block'>Frescor</div><div class='val' style='color:"+tc+"'>"+last.tsb+"</div><div class='unit'>TSB</div></div>";
    h+="</div>";
    h+="<div style='font-size:11px;font-weight:700;color:var(--tm);text-transform:uppercase;letter-spacing:.04em;margin-top:14px'>On ets a l'escala de frescor</div>";
    h+=scaleBar(last.tsb,-35,25,[{to:-25,c:"#E9B6BC"},{to:-10,c:"#F2DFB3"},{to:5,c:"#E7E0CF"},{to:20,c:"#BFE8D0"},{to:25,c:"#CDD1EF"}]);
    h+="<div style='display:flex;justify-content:space-between;font-size:9px;color:var(--tm);margin-bottom:2px'><span>sobrecàrrega</span><span>carregat</span><span>neutre</span><span>fresc</span><span>molt fresc</span></div>";
    h+=interp("La frescor (TSB) és la forma menys la fatiga. <b>Negatiu</b> vol dir que entrenes per sobre del que tens assimilat — normal i desitjable quan construeixes. <b>Positiu</b>, que arribes fresc — ideal abans d'un dia exigent.");
    h+="</div>";
  }

  // B4 — ACWR gauge bar
  if(acwr!==null){
    const minV=0.4,maxV=2.0;
    const posPct=Math.max(0,Math.min(100,(acwr-minV)/(maxV-minV)*100));

    // gauge track with zones: low(.4-.8) optimal(.8-1.3) caution(1.3-1.5) risk(1.5-2)
    h+="<div style='position:relative;height:14px;border-radius:7px;overflow:hidden;display:flex'>";
    h+="<div style='width:"+((0.8-minV)/(maxV-minV)*100)+"%;background:#7BA7E5'></div>";

    h+="<div style='width:"+((1.5-1.3)/(maxV-minV)*100)+"%;background:#F5A623'></div>";
    h+="<div style='width:"+((maxV-1.5)/(maxV-minV)*100)+"%;background:#E5383B'></div>";
    h+="</div>";
    // marker
    h+="<div style='position:relative;height:0'><div style='position:absolute;left:"+posPct+"%;top:-19px;transform:translateX(-50%);width:4px;height:20px;background:var(--on-surface);border-radius:2px;box-shadow:0 0 0 2px var(--surface)'></div></div>";

    h+="<div style='display:flex;gap:12px;margin-top:8px'>";

    h+="</div></div>";
  }

  // B6 — recovery estimate
  const rec=estRecovery();
  if(rec!==null){
    const done=rec.remaining<=0;
    const big=done?"✓":"~"+rec.remaining+"h";
    const bigCol=done?"var(--ok)":rec.remaining>24?"var(--warn)":"var(--bu)";
    const sub=done
      ? "Ja estàs recuperat de l'última sessió ("+rec.total+"h estimades)."
      : "Et queden ~"+rec.remaining+"h de les "+rec.total+"h recomanades"+(rec.approx?" (hora aproximada)":"")+".";

  }

  // CTL/ATL/TSB evolution chart
  if(ff.length>10){
    h+="<div class='card'><h3>"+ht("ff","Evolució")+" · Fitness / Fatiga / Forma</h3><div class='chart-box' style='height:240px'><canvas id='chFF'></canvas></div></div>";
  }

  // B1 — fitness projection
  if(ff.length>10){
    const dailyLoad=getS28().trimp/28;
    const proj=projectFitness(ff,14,dailyLoad);
    if(proj.length){
      const peak=proj.reduce((b,p)=>p.tsb>b.tsb?p:b,proj[0]);

      h+="<div style='font-size:13px;color:var(--ts);line-height:1.65;margin-bottom:10px'>Si mantens la càrrega actual (~"+Math.round(dailyLoad)+" TRIMP/dia), d'aquí 14 dies la teva <b>frescor (TSB)</b> serà de <b style='color:var(--on-surface);font-size:15px'>"+ptsbV+"</b>.</div>";
      h+="<div style='font-size:12.5px;color:var(--ts);line-height:1.6;background:var(--bg);border-radius:10px;padding:11px 13px;margin-bottom:10px'><b>Què és el TSB?</b> Són les sigles de <i>Training Stress Balance</i> (balanç d'estrès d'entrenament). És la resta entre la teva <b>forma física</b> de fons (CTL, acumulada en setmanes) i la <b>fatiga</b> recent (ATL, dels últims dies):<br><br><span style='font-family:monospace;font-size:12px'>TSB = forma (CTL) − fatiga (ATL)</span><br><br>• <b>TSB negatiu</b> → portes més fatiga que forma assimilada. És l'estat normal i desitjable mentre construeixes: vol dir que estàs estimulant el cos.<br>• <b>TSB proper a zero</b> → equilibri entre càrrega i recuperació.<br>• <b>TSB positiu</b> → arribes fresc, amb la fatiga esvaïda. Ideal abans d'un dia exigent, però mantingut masses setmanes pot voler dir que t'has relaxat massa.</div>";
      h+="<div class='chart-box' style='height:160px'><canvas id='chProj'></canvas></div>";
      const ptsb=proj[proj.length-1].tsb;
      h+=interp(ptsb>10?"Acabaràs fresc: bo si vols arribar a punt per a un repte, però si la idea és construir, potser pots assumir una mica més de càrrega.":ptsb<-20?"Acumularàs molta fatiga: vigila, perquè a aquest ritme el risc de sobrecàrrega creix. Considera intercalar una setmana de descàrrega.":"Mantindràs un equilibri sa entre càrrega i frescor si segueixes en aquesta línia.");
      h+="</div>";
    }
  }

  h+="</div>";m.innerHTML=h;
  if(ff.length>10){
    setTimeout(()=>{
      const d=ff.slice(-90);
      makeChart("chFF",{type:"line",data:{labels:d.map(x=>x.label),datasets:[
        {label:"Fitness (CTL)",data:d.map(x=>x.ctl),borderColor:"#4A4FB5",backgroundColor:"rgba(74,79,181,.12)",fill:true,tension:.3,pointRadius:0},
        {label:"Fatiga (ATL)",data:d.map(x=>x.atl),borderColor:"#E5383B",tension:.3,pointRadius:0},
        {label:"Forma (TSB)",data:d.map(x=>x.tsb),borderColor:"#2F9E44",tension:.3,pointRadius:0}
      ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"bottom",labels:{boxWidth:12,font:{size:10}}}},scales:{x:{ticks:{maxTicksToShow:8,font:{size:9}}}}}});
      const dailyLoad=getS28().trimp/28;
      const proj=projectFitness(ff,14,dailyLoad);
      if(proj.length)makeChart("chProj",{type:"line",data:{labels:proj.map(p=>"+"+p.day+"d"),datasets:[
        {label:"Fitness",data:proj.map(p=>p.ctl),borderColor:"#4A4FB5",tension:.3,pointRadius:0},
        {label:"Forma (TSB)",data:proj.map(p=>p.tsb),borderColor:"#2F9E44",backgroundColor:"rgba(47,158,68,.12)",fill:true,tension:.3,pointRadius:0}
      ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"bottom",labels:{boxWidth:12,font:{size:10}}}},scales:{x:{ticks:{font:{size:9}}}}}});
    },50);
  }
}

// Detailed workout description per type, scaled to km
function sessionDetail(type,km){
  switch(type){
    case"easy":return "Ritme còmode i conversacional (Z2). "+km+" km a intensitat baixa per construir base aeròbica.";
    case"quality":return "Escalfa 15', després "+(km>=8?"5×1000 m":"4×800 m")+" a ritme 10K (Z4) amb 2' de trot suau entre sèries. Tornada a la calma 10'. Total ~"+km+" km.";
    case"tempo":return "Escalfa 15', "+(km>=9?"20'":"15'")+" continus a ritme llindar (Z3-Z4, controlat però exigent), calma 10'. Total ~"+km+" km.";
    case"long":return "Ritme suau i sostingut (Z1-Z2). "+km+" km. Si és trail, busca desnivell progressiu. Hidrata't i no forcis el ritme.";
    case"rest":return "Descans total o caminada/estiraments suaus. La recuperació és part de l'entrenament.";
    default:return "";
  }
}
// Strength session adapted to age (master) and real training load (CTL/ATL/TSB/ACWR)
function strengthSession(seed){
  const age=userAge()||44;
  const ff=calcFF();const last=ff.length?ff[ff.length-1]:null;
  const acwr=calcACWR();
  const tsb=last?last.tsb:0;
  // load state: high fatigue → maintenance (less volume, no failure); fresh → can push a bit
  const highLoad=(tsb<-12)||((acwr||1)>1.35);
  const fresh=(tsb>5)&&((acwr||1)<1.1);
  // base readiness: weeks of consistent training in history (power only if enough base)
  const hist=analyzeHistory();
  const baseReady=hist&&hist.nWeeks>=6&&hist.avgDays>=3;
  const rpPre=racePhase();
  const taperCut=rpPre&&!rpPre.past&&(rpPre.phase==="taper"||rpPre.phase==="setmana de cursa");
  const st=pickEx("strength",taperCut?2:(highLoad?2:3),seed);
  const co=pickEx("core",taperCut?1:2,seed+7);
  // master (40+): include power ONLY when base ready AND not fatigued, and conservatively
  let pw=[];
  if(baseReady&&!highLoad&&age>=40){pw=pickEx("power",fresh?2:1,seed+13)}
  // P6: periodització per fase del macrocicle
  const rpS=racePhase();
  let phaseNote="";
  if(rpS&&!rpS.past){
    if(rpS.phase==="taper"||rpS.phase==="setmana de cursa"){pw=[];phaseNote=" Fase de taper: només manteniment lleuger, res de nou ni a la fallada."}
    else if(rpS.phase==="pic"){phaseNote=" Fase de pic: prioritza la potència reactiva amb volum baix i màxima qualitat."}
    else if(rpS.phase==="específic"){phaseNote=" Fase específica: força pesada/unipodal com a prioritat; la potència és el complement."}
    else{phaseNote=" Fase de base: construeix força general amb progressió tranquil·la."}
  }
  // scale sets down if high load (maintenance, avoid added fatigue)
  const scale=arr=>highLoad?arr.map(e=>({...e,s:Math.max(2,e.s-1),note:"manteniment"})):arr;
  return {strength:scale(st),core:scale(co),power:pw,
    loadNote:(highLoad?"Càrrega de carrera alta: força de manteniment (sense arribar a la fallada).":fresh?"Estàs fresc: pots fer la sessió completa amb bona qualitat.":"Sessió estàndard.")+phaseNote,
    hasPower:pw.length>0,baseReady:baseReady};
}

function regenPlan(){if(planState&&planState.edited){if(!confirm("Es regenerarà el pla i es perdran els canvis manuals. Continuar?"))return}clearPlan();planState=genWeekPlan();render()}

// ═══ PEÇA 2: IA REFINA EL PLA (amb periodització en blocs + validació dura) ═══
// Determine which week of the training block we're in (4-week cycle: 3 load + 1 deload)
function blockWeek(){
  // count consecutive recent weeks of rising load to infer block position
  const wk=getWeekly().slice(-4);
  if(wk.length<2)return{week:1,phase:"càrrega"};
  // simple heuristic: if last week was a clear drop vs prior, we just deloaded → week 1
  const vols=wk.map(w=>w.km);
  const lastDrop=vols.length>=2&&vols[vols.length-1]<vols[vols.length-2]*0.8;
  if(lastDrop)return{week:1,phase:"càrrega"};
  // count rising weeks
  let rising=1;
  for(let i=vols.length-1;i>0;i--){if(vols[i]>=vols[i-1]*0.95)rising++;else break}
  const wnum=Math.min(4,rising);
  return{week:wnum,phase:wnum>=4?"descàrrega":"càrrega"};
}

// HARD SAFETY VALIDATOR — code barrier the AI cannot override
function validatePlan(plan,baseVol){
  if(!plan||!Array.isArray(plan.sessions))return{ok:false,reason:"format invàlid"};
  const runKm=plan.sessions.filter(s=>s.type!=="rest").reduce((s,x)=>s+(+x.km||0),0);
  // Barrier 1: weekly volume jump ≤10% over recent average
  if(baseVol>0&&runKm>baseVol*1.12)return{ok:false,reason:"volum +"+Math.round((runKm/baseVol-1)*100)+"% supera el límit segur del 10%"};
  // Barrier 2: at most 2 hard sessions/week
  const hard=plan.sessions.filter(s=>s.type==="quality"||s.type==="tempo").length;
  if(hard>2)return{ok:false,reason:hard+" sessions dures (màx 2)"};
  // Barrier 3: 80/20 — hard volume ≤30% of total
  const hardKm=plan.sessions.filter(s=>s.type==="quality"||s.type==="tempo").reduce((s,x)=>s+(+x.km||0),0);
  if(runKm>0&&hardKm/runKm>0.32)return{ok:false,reason:"massa volum intens (>30%, trenca 80/20)"};
  // Barrier 4: valid days & types
  const validTypes=["rest","easy","quality","tempo","long"];
  for(const s of plan.sessions){if(!DOW_ORDER.includes(s.day)||!validTypes.includes(s.type))return{ok:false,reason:"dia o tipus invàlid"}}
  return{ok:true};
}

let aiPlanBusy=false;
async function aiRefinePlan(){
  if(!settings.aiKey){alert("Configura la clau d'API a Perfil → AI Coach primer.");return}
  if(aiPlanBusy)return;aiPlanBusy=true;
  const btn=document.getElementById("aiPlanBtn");
  if(btn){btn.textContent="L'entrenador IA està analitzant...";btn.disabled=true}
  const draft=genWeekPlan();
  if(draft.insufficient){if(btn){btn.textContent="Cal més historial";btn.disabled=false}aiPlanBusy=false;return}
  const bw=blockWeek();
  // Volume baseline: recent 3-4 week average (current fitness), not the 2-year mean.
  const recentWeeks=getWeekly().slice(-4).map(w=>w.km).filter(k=>k>0);
  const recentAvg=recentWeeks.length?recentWeeks.reduce((s,k)=>s+k,0)/recentWeeks.length:0;
  const histAvg=draft.hist?draft.hist.avgVol:0;
  const baseVol=Math.round(Math.max(recentAvg,histAvg));
  const context=buildTrainingContext();
  const draftJson=JSON.stringify({sessions:draft.sessions,strengthDays:draft.strengthDays,targetVol:draft.targetVol,phase:draft.phase});
  // Concrete numeric limits so the AI doesn't have to do arithmetic
  const maxVol=Math.round(baseVol*1.10*10)/10;          // hard volume ceiling
  const maxHardKm=null;                                  // computed per total below
  const sys="Ets un entrenador expert en running/trail. Millores un esborrany de pla setmanal amb raonament d'entrenador. REGLES ESTRICTES QUE NO POTS TRENCAR (el sistema rebutjarà el pla si les incompleixes):\n"
    +"1. El volum total de carrera NO pot superar "+maxVol+" km aquesta setmana.\n"
    +"2. Màxim 2 sessions dures (quality o tempo).\n"
    +"3. El volum de sessions dures ha de ser ≤30% del volum total (polarització 80/20).\n"
    +"4. Dies vàlids: dl,dt,dc,dj,dv,ds,dg. Tipus vàlids: rest,easy,quality,tempo,long.\n"
    +"Tens en compte la setmana del bloc, la fatiga i l'edat (màster). Abans de respondre, SUMA els km i comprova que el total ≤"+maxVol+" km i que els km durs ≤30% del total.\n"
    +"RESPON NOMÉS amb JSON vàlid, sense text ni markdown: {\"sessions\":[{\"day\":\"dl\",\"type\":\"easy\",\"km\":10}],\"strengthDays\":[\"dt\"],\"rationale\":\"breu, en català\"}";
  let userMsg="CONTEXT:\n"+context+"\n\nSETMANA DEL BLOC: "+bw.week+"/4 ("+bw.phase+")\n\nLÍMIT DE VOLUM AQUESTA SETMANA: "+maxVol+" km (NO el superis)\n\nESBORRANY DE REGLES:\n"+draftJson+"\n\nMillora el pla. Objectiu: forma física general (base aeròbica + llindar). Retorna NOMÉS el JSON.";

  async function callModel(msg){
    if(settings.aiProvider==="anthropic"){
      const resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":settings.aiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:settings.aiModel,max_tokens:1024,system:sys,messages:[{role:"user",content:msg}]})});
      if(!resp.ok)throw new Error("HTTP "+resp.status);
      const data=await resp.json();return data.content.filter(c=>c.type==="text").map(c=>c.text).join("");
    }else{
      const resp=await fetch("https://api.openai.com/v1/chat/completions",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+settings.aiKey},body:JSON.stringify({model:settings.aiModel,max_tokens:1024,messages:[{role:"system",content:sys},{role:"user",content:msg}]})});
      if(!resp.ok)throw new Error("HTTP "+resp.status);
      const data=await resp.json();return data.choices[0].message.content;
    }
  }

  try{
    let aiPlan=null,lastReason="",accepted=false;
    // Up to 2 attempts: if rejected, feed the reason back so the AI corrects itself
    for(let attempt=0;attempt<2&&!accepted;attempt++){
      const msg=attempt===0?userMsg:userMsg+"\n\nEL TEU PLA ANTERIOR HA ESTAT REBUTJAT: "+lastReason+". Corregeix-ho i retorna un JSON que compleixi TOTS els límits.";
      const respText=await callModel(msg);
      const clean=respText.replace(/```json|```/g,"").trim();
      try{aiPlan=JSON.parse(clean)}catch(e){lastReason="format JSON invàlid";continue}
      const v=validatePlan(aiPlan,baseVol);
      if(v.ok){accepted=true}else{lastReason=v.reason}
    }
    if(accepted&&aiPlan){
      aiPlan.sessions.sort((a,b)=>DOW_ORDER.indexOf(a.day)-DOW_ORDER.indexOf(b.day));
      planState={hist:draft.hist,phase:draft.phase,targetVol:aiPlan.sessions.filter(s=>s.type!=="rest").reduce((s,x)=>s+(+x.km||0),0),sessions:aiPlan.sessions,strengthDays:aiPlan.strengthDays||draft.strengthDays,blockWeek:bw,aiNote:aiPlan.rationale||"Pla ajustat per la IA.",aiGenerated:true};
    }else{
      planState=draft;planState.aiNote="He mantingut el pla de regles: la proposta de la IA no s'ajustava als límits de seguretat ("+lastReason+") després de dos intents. El pla de regles ja és segur i equilibrat.";
    }
    savePlan();
  }catch(err){
    planState=draft;planState.aiNote="No s'ha pogut connectar amb la IA ("+err.message+"). S'ha aplicat el pla de regles, que és segur.";
  }
  aiPlanBusy=false;render();
}

function setPlanDay(d,t){
  if(!planState)return;
  const i=planState.sessions.findIndex(s=>s.day===d);
  if(t==="rest"){if(i>=0)planState.sessions.splice(i,1)}
  else{
    if(i>=0)planState.sessions[i].type=t;
    else planState.sessions.push({day:d,type:t,km:t==="long"?Math.round(planState.targetVol*0.3):8});
  }
  planState.sessions.sort((a,b)=>DOW_ORDER.indexOf(a.day)-DOW_ORDER.indexOf(b.day));
  savePlan();closePlanEditor();render();renderPlanEditor();
}
function adjPlanKm(d,delta){
  if(!planState)return;const s=planState.sessions.find(x=>x.day===d);if(!s)return;
  s.km=Math.max(1,s.km+delta);savePlan();render();renderPlanEditor();
}
function togglePlanStrength(d){
  if(!planState)return;const i=planState.strengthDays.indexOf(d);
  if(i>=0)planState.strengthDays.splice(i,1);else planState.strengthDays.push(d);
  savePlan();render();renderPlanEditor();
}

let aiMessages=[]; // conversation history
